<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            padding: 0;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            padding: 8px 20px 12px 20px;
            z-index: 100;
        }
        
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .tab.active {
            color: #1ed760;
        }
        
        .tab-icon {
            font-size: 22px;
        }
        
        /* Main Content - scrollable area above mini player */
        .main-content {
            padding: 20px 16px 80px 16px;
            max-width: 600px;
            margin: 0 auto;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        
        .header p {
            font-size: 15px;
            opacity: 0.7;
        }
        
        /* Search */
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            margin-bottom: 20px;
        }
        
        .search-box:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Track List */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .track-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .track-cover {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1db954 0%, #191414 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .track-info {
            flex: 1;
            min-width: 0;
        }
        
        .track-title {
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-artist {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-duration {
            font-size: 13px;
            opacity: 0.5;
            flex-shrink: 0;
        }
        
        /* ===== MINI PLAYER (Spotify style) ===== */
        .mini-player {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            z-index: 101;
            transform: translateY(0);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        
        .mini-player.hidden {
            transform: translateY(100%);
        }
        
        .mini-player-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .mini-player-cover {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1db954 0%, #191414 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .mini-player-info {
            flex: 1;
            min-width: 0;
        }
        
        .mini-player-title {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .mini-player-artist {
            font-size: 12px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .mini-player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .mini-player-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s ease;
        }
        
        .mini-player-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .mini-player-btn.play {
            font-size: 28px;
        }
        
        /* ===== EXPANDED PLAYER (Full Screen) ===== */
        .expanded-player {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .expanded-player.active {
            transform: translateY(0);
        }
        
        .expanded-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
        }
        
        .expanded-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .expanded-close:active {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .expanded-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .expanded-cover {
            width: 280px;
            height: 280px;
            border-radius: 16px;
            background: linear-gradient(135deg, #1db954 0%, #191414 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin-bottom: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .expanded-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .expanded-artist {
            font-size: 16px;
            opacity: 0.7;
            text-align: center;
            margin-bottom: 32px;
        }
        
        .expanded-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 24px;
        }
        
        .expanded-control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: transform 0.1s ease;
        }
        
        .expanded-control-btn:active {
            transform: scale(0.95);
        }
        
        .expanded-control-btn.play {
            background: #1ed760;
            color: black;
            font-size: 32px;
            width: 64px;
            height: 64px;
        }
        
        .expanded-progress {
            width: 100%;
            max-width: 400px;
            margin-bottom: 8px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1ed760;
            border-radius: 2px;
            transition: width 0.1s linear;
        }
        
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            opacity: 0.5;
        }
        
        .expanded-actions {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 24px;
        }
        
        .expanded-actions button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Queue in expanded player */
        .queue-section {
            width: 100%;
            max-width: 500px;
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }
        
        .queue-title {
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        
        .queue-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .queue-item {
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }
        
        .queue-item.active {
            color: #1ed760;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }
        
        .hidden {
            display: none;
        }
        
        /* Playlist Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: #121212;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-buttons button:first-child {
            background: #1ed760;
            color: black;
        }
        
        .modal-buttons button:last-child {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        /* Profile */
        .profile-section {
            text-align: center;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1db954 0%, #191414 100%);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .profile-username {
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 24px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .create-playlist-btn {
            width: 100%;
            padding: 14px;
            background: #1ed760;
            color: black;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        .playlist-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .playlist-card:active {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .playlist-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab" data-tab="search">
            <div class="tab-icon">🔍</div>
            <span>Поиск</span>
        </button>
        <button class="tab" data-tab="library">
            <div class="tab-icon">❤️</div>
            <span>Любимое</span>
        </button>
        <button class="tab" data-tab="playlists">
            <div class="tab-icon">📀</div>
            <span>Плейлисты</span>
        </button>
        <button class="tab" data-tab="profile">
            <div class="tab-icon">👤</div>
            <span>Профиль</span>
        </button>
    </div>
    
    <div class="main-content" id="mainContent">
        <div id="search-tab">
            <div class="header">
                <h1>Поиск</h1>
                <p>Найди и слушай любую музыку</p>
            </div>
            <input type="text" class="search-box" id="searchInput" placeholder="Что хочешь послушать?" autofocus>
            <div class="track-list" id="searchResults"></div>
        </div>
        
        <div id="library-tab" class="hidden">
            <div class="header">
                <h1>Любимое</h1>
                <p>Треки, которые тебе понравились</p>
            </div>
            <div class="track-list" id="libraryList"></div>
        </div>
        
        <div id="playlists-tab" class="hidden">
            <div class="header">
                <h1>Плейлисты</h1>
                <p>Создавай подборки</p>
            </div>
            <button class="create-playlist-btn" id="createPlaylistBtn">+ Новый плейлист</button>
            <div id="playlistsList"></div>
        </div>
        
        <div id="profile-tab" class="hidden">
            <div class="profile-section">
                <div class="avatar" id="avatar">🎵</div>
                <div class="profile-name" id="displayName"></div>
                <div class="profile-username" id="username"></div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="likesCount">0</div>
                        <div class="stat-label">Лайков</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="playlistsCount">0</div>
                        <div class="stat-label">Плейлистов</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- MINI PLAYER (свёрнутый) -->
    <div class="mini-player hidden" id="miniPlayer">
        <div class="mini-player-content">
            <div class="mini-player-cover" id="miniCover">🎵</div>
            <div class="mini-player-info">
                <div class="mini-player-title" id="miniTitle">Выберите трек</div>
                <div class="mini-player-artist" id="miniArtist"></div>
            </div>
            <div class="mini-player-controls">
                <button class="mini-player-btn" id="miniPrevBtn">⏮️</button>
                <button class="mini-player-btn play" id="miniPlayPauseBtn">▶️</button>
                <button class="mini-player-btn" id="miniNextBtn">⏭️</button>
            </div>
        </div>
    </div>
    
    <!-- EXPANDED PLAYER (развёрнутый) -->
    <div class="expanded-player" id="expandedPlayer">
        <div class="expanded-header">
            <button class="expanded-close" id="closeExpandedBtn">↓</button>
            <div></div>
            <button class="expanded-close" id="closeExpandedBtn2">✕</button>
        </div>
        
        <div class="expanded-content">
            <div class="expanded-cover" id="expandedCover">🎵</div>
            <div class="expanded-title" id="expandedTitle">Выберите трек</div>
            <div class="expanded-artist" id="expandedArtist"></div>
            
            <div class="expanded-progress">
                <div class="progress-bar" id="expandedProgressBar">
                    <div class="progress-fill" id="expandedProgressFill"></div>
                </div>
                <div class="time-info">
                    <span id="expandedCurrentTime">0:00</span>
                    <span id="expandedTotalTime">0:00</span>
                </div>
            </div>
            
            <div class="expanded-controls">
                <button class="expanded-control-btn" id="expandedPrevBtn">⏮️</button>
                <button class="expanded-control-btn play" id="expandedPlayPauseBtn">▶️</button>
                <button class="expanded-control-btn" id="expandedNextBtn">⏭️</button>
            </div>
            
            <div class="expanded-actions">
                <button id="expandedLikeBtn">❤️ Лайк</button>
                <button id="expandedPlaylistBtn">📀 В плейлист</button>
            </div>
            
            <div class="queue-section">
                <div class="queue-title">
                    <span>Очередь</span>
                    <span style="font-size:12px;" id="queueCount">0 треков</span>
                </div>
                <div class="queue-list" id="expandedQueueList"></div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <!-- Modals -->
    <div class="modal" id="playlistModal">
        <div class="modal-content">
            <h3>Новый плейлист</h3>
            <input type="text" id="playlistName" placeholder="Название плейлиста">
            <div class="modal-buttons">
                <button onclick="createPlaylist()">Создать</button>
                <button onclick="closePlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="addToPlaylistModal">
        <div class="modal-content">
            <h3>Добавить в плейлист</h3>
            <div id="playlistSelect"></div>
            <div class="modal-buttons">
                <button onclick="closeAddToPlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const telegramId = tg.initDataUnsafe?.user?.id;
        const telegramUsername = tg.initDataUnsafe?.user?.username || '';
        const telegramFirstName = tg.initDataUnsafe?.user?.first_name || '';
        
        let currentTab = 'search';
        let currentTrack = null;
        let queue = [];
        let currentQueueIndex = 0;
        let audio = new Audio();
        let isPlaying = false;
        let likedTracks = new Map();
        let userPlaylists = [];
        let currentTrackForPlaylist = null;
        
        // DOM elements
        const miniPlayer = document.getElementById('miniPlayer');
        const expandedPlayer = document.getElementById('expandedPlayer');
        
        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        async function initProfile() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/profile/${telegramId}`);
            const profile = await response.json();
            
            if (!profile.exists) {
                await fetch(`/api/profile/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: telegramUsername,
                        display_name: telegramFirstName
                    })
                });
            }
            
            document.getElementById('displayName').textContent = profile.display_name || telegramFirstName;
            document.getElementById('username').textContent = `@${telegramUsername || 'user'}`;
            
            if (profile.stats) {
                document.getElementById('likesCount').textContent = profile.stats.likes;
                document.getElementById('playlistsCount').textContent = profile.stats.playlists;
            }
            
            await loadLikes();
            await loadPlaylists();
        }
        
        // ===== ЛАЙКИ =====
        async function loadLikes() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/likes/${telegramId}`);
            const likes = await response.json();
            
            likedTracks.clear();
            likes.forEach(like => {
                likedTracks.set(like.track_id, like);
            });
            
            document.getElementById('likesCount').textContent = likes.length;
            updateLikeButton();
            
            const libraryList = document.getElementById('libraryList');
            if (likes.length === 0) {
                libraryList.innerHTML = '<div class="empty-state">Нет сохранённых треков<br>❤️ Лайкайте музыку</div>';
            } else {
                libraryList.innerHTML = '';
                likes.forEach(like => {
                    const div = createTrackElement(like);
                    libraryList.appendChild(div);
                });
            }
        }
        
        async function toggleLike() {
            if (!currentTrack || !telegramId) return;
            
            const isLiked = likedTracks.has(currentTrack.track_id);
            
            if (isLiked) {
                await fetch(`/api/likes/${telegramId}?track_id=${currentTrack.track_id}`, { method: 'DELETE' });
                likedTracks.delete(currentTrack.track_id);
                showToast('❤️ Удалено из любимых');
            } else {
                await fetch(`/api/likes/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        track_id: currentTrack.track_id,
                        title: currentTrack.title,
                        artist: currentTrack.artist,
                        url: currentTrack.url,
                        thumbnail: currentTrack.thumbnail
                    })
                });
                likedTracks.set(currentTrack.track_id, currentTrack);
                showToast('❤️ Добавлено в любимое');
            }
            
            updateLikeButton();
            document.getElementById('likesCount').textContent = likedTracks.size;
            await loadLikes();
        }
        
        function updateLikeButton() {
            const likeBtn = document.getElementById('expandedLikeBtn');
            if (currentTrack && likedTracks.has(currentTrack.track_id)) {
                likeBtn.innerHTML = '❤️ В любимых';
                likeBtn.style.opacity = '1';
            } else {
                likeBtn.innerHTML = '🤍 Лайк';
                likeBtn.style.opacity = '0.7';
            }
        }
        
        // ===== ПЛЕЙЛИСТЫ =====
        async function loadPlaylists() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/playlists/${telegramId}`);
            userPlaylists = await response.json();
            
            document.getElementById('playlistsCount').textContent = userPlaylists.length;
            
            const playlistsList = document.getElementById('playlistsList');
            if (userPlaylists.length === 0) {
                playlistsList.innerHTML = '<div class="empty-state">У вас пока нет плейлистов<br>Создайте первый!</div>';
            } else {
                playlistsList.innerHTML = '';
                userPlaylists.forEach(playlist => {
                    const div = document.createElement('div');
                    div.className = 'playlist-card';
                    div.onclick = () => openPlaylist(playlist);
                    div.innerHTML = `
                        <div class="playlist-name">${escapeHtml(playlist.name)}</div>
                        <div style="font-size:12px; opacity:0.5;">${new Date(playlist.created_at).toLocaleDateString()}</div>
                    `;
                    playlistsList.appendChild(div);
                });
            }
        }
        
        async function openPlaylist(playlist) {
            const response = await fetch(`/api/playlists/${playlist.id}/tracks`);
            const tracks = await response.json();
            
            if (tracks.length === 0) {
                showToast('Плейлист пуст');
            } else {
                setQueue(tracks);
                playTrack(tracks[0]);
            }
        }
        
        function createPlaylist() {
            const name = document.getElementById('playlistName').value.trim();
            if (!name) {
                showToast('Введите название плейлиста');
                return;
            }
            
            fetch(`/api/playlists/${telegramId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            }).then(() => {
                closePlaylistModal();
                loadPlaylists();
                showToast('Плейлист создан');
            });
        }
        
        async function addCurrentToPlaylist() {
            if (!currentTrack) return;
            currentTrackForPlaylist = currentTrack;
            
            if (userPlaylists.length === 0) {
                showToast('Сначала создайте плейлист');
                return;
            }
            
            const selectDiv = document.getElementById('playlistSelect');
            selectDiv.innerHTML = userPlaylists.map(playlist => `
                <button onclick="addTrackToPlaylist(${playlist.id})" style="width:100%; padding:12px; margin-bottom:8px; background:rgba(255,255,255,0.1); border:none; border-radius:12px; text-align:left; color:white; cursor:pointer;">
                    <strong>${escapeHtml(playlist.name)}</strong>
                </button>
            `).join('');
            
            document.getElementById('addToPlaylistModal').classList.add('active');
        }
        
        async function addTrackToPlaylist(playlistId) {
            await fetch(`/api/playlists/${playlistId}/tracks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    track_id: currentTrackForPlaylist.track_id,
                    title: currentTrackForPlaylist.title,
                    artist: currentTrackForPlaylist.artist,
                    url: currentTrackForPlaylist.url,
                    thumbnail: currentTrackForPlaylist.thumbnail
                })
            });
            closeAddToPlaylistModal();
            showToast('Трек добавлен в плейлист');
        }
        
        // ===== ОЧЕРЕДЬ И ПЛЕЕР =====
        function setQueue(tracks) {
            queue = tracks.map((track, idx) => ({
                ...track,
                track_id: track.track_id || `track_${idx}_${Date.now()}`
            }));
            currentQueueIndex = 0;
            renderExpandedQueue();
        }
        
        function addToQueue(track) {
            queue.push({
                ...track,
                track_id: track.track_id || `track_${Date.now()}_${Math.random()}`
            });
            renderExpandedQueue();
            showToast(`Добавлено в очередь (${queue.length})`);
        }
        
        function renderExpandedQueue() {
            const queueList = document.getElementById('expandedQueueList');
            const queueCount = document.getElementById('queueCount');
            queueCount.textContent = `${queue.length} треков`;
            
            if (queue.length === 0) {
                queueList.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5;">Очередь пуста</div>';
                return;
            }
            
            queueList.innerHTML = queue.map((track, idx) => `
                <div class="queue-item ${idx === currentQueueIndex ? 'active' : ''}" onclick="playTrackByIndex(${idx})">
                    <div style="flex:1;">
                        <div style="font-weight:500;">${escapeHtml(track.title)}</div>
                        <div style="font-size:12px; opacity:0.7;">${escapeHtml(track.artist)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function playTrackByIndex(index) {
            if (index >= 0 && index < queue.length) {
                currentQueueIndex = index;
                playTrack(queue[currentQueueIndex]);
            }
        }
        
        function updateMiniPlayer() {
            if (currentTrack) {
                document.getElementById('miniTitle').textContent = currentTrack.title;
                document.getElementById('miniArtist').textContent = currentTrack.artist;
                document.getElementById('expandedTitle').textContent = currentTrack.title;
                document.getElementById('expandedArtist').textContent = currentTrack.artist;
                miniPlayer.classList.remove('hidden');
            } else {
                miniPlayer.classList.add('hidden');
            }
        }
        
        async function playTrack(track) {
            currentTrack = track;
            updateMiniPlayer();
            updateLikeButton();
            
            // Сохраняем в историю
            if (telegramId) {
                await fetch(`/api/history/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        track_id: track.track_id,
                        title: track.title,
                        artist: track.artist
                    })
                });
            }
            
            // Загружаем аудио
            const response = await fetch(`/download?url=${encodeURIComponent(track.url)}`);
            const data = await response.json();
            
            if (data.url) {
                audio.src = data.url;
                audio.play();
                isPlaying = true;
                updatePlayButtons(true);
            } else {
                showToast('Не удалось загрузить трек');
            }
        }
        
        function playNext() {
            if (currentQueueIndex + 1 < queue.length) {
                currentQueueIndex++;
                playTrack(queue[currentQueueIndex]);
            } else {
                showToast('Очередь закончилась');
            }
        }
        
        function playPrev() {
            if (currentQueueIndex - 1 >= 0) {
                currentQueueIndex--;
                playTrack(queue[currentQueueIndex]);
            }
        }
        
        function updatePlayButtons(playing) {
            const playIcon = playing ? '⏸️' : '▶️';
            const playIconBig = playing ? '⏸️' : '▶️';
            document.getElementById('miniPlayPauseBtn').textContent = playIcon;
            document.getElementById('expandedPlayPauseBtn').textContent = playIconBig;
        }
        
        // Аудио события
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('expandedProgressFill').style.width = `${percent}%`;
                document.getElementById('expandedCurrentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('expandedTotalTime').textContent = formatTime(audio.duration);
            }
        });
        
        audio.addEventListener('ended', () => {
            playNext();
        });
        
        audio.addEventListener('play', () => {
            isPlaying = true;
            updatePlayButtons(true);
        });
        
        audio.addEventListener('pause', () => {
            isPlaying = false;
            updatePlayButtons(false);
        });
        
        function togglePlayPause() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }
        
        function seek(e, barId) {
            const bar = document.getElementById(barId);
            const rect = bar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // ===== СОЗДАНИЕ ЭЛЕМЕНТА ТРЕКА =====
        function createTrackElement(track) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                </div>
                <div class="track-duration">${formatTime(track.duration)}</div>
            `;
            div.onclick = () => {
                addToQueue(track);
                if (queue.length === 1) {
                    playTrack(track);
                }
            };
            return div;
        }
        
        // ===== ПОИСК =====
        async function searchTracks(query) {
            const searchResults = document.getElementById('searchResults');
            searchResults.innerHTML = '<div class="loading">Поиск...</div>';
            
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (!tracks || tracks.length === 0) {
                    searchResults.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                    return;
                }
                
                searchResults.innerHTML = '';
                tracks.forEach(track => {
                    searchResults.appendChild(createTrackElement({
                        ...track,
                        track_id: track.id
                    }));
                });
            } catch (e) {
                console.error(e);
                searchResults.innerHTML = '<div class="empty-state">Ошибка поиска</div>';
            }
        }
        
        // ===== TAB ПЕРЕКЛЮЧЕНИЕ =====
        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            
            document.getElementById('search-tab').classList.add('hidden');
            document.getElementById('library-tab').classList.add('hidden');
            document.getElementById('playlists-tab').classList.add('hidden');
            document.getElementById('profile-tab').classList.add('hidden');
            
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
            
            if (tabId === 'library') loadLikes();
            if (tabId === 'playlists') loadPlaylists();
        }
        
        // ===== MODAL =====
        function closePlaylistModal() {
            document.getElementById('playlistModal').classList.remove('active');
            document.getElementById('playlistName').value = '';
        }
        
        function closeAddToPlaylistModal() {
            document.getElementById('addToPlaylistModal').classList.remove('active');
            currentTrackForPlaylist = null;
        }
        
        function expandPlayer() {
            renderExpandedQueue();
            expandedPlayer.classList.add('active');
        }
        
        function collapsePlayer() {
            expandedPlayer.classList.remove('active');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ===== EVENT LISTENERS =====
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });
        
        document.getElementById('createPlaylistBtn').onclick = () => {
            document.getElementById('playlistModal').classList.add('active');
        };
        
        // Mini player controls
        document.getElementById('miniPlayPauseBtn').onclick = (e) => {
            e.stopPropagation();
            togglePlayPause();
        };
        document.getElementById('miniPrevBtn').onclick = (e) => {
            e.stopPropagation();
            playPrev();
        };
        document.getElementById('miniNextBtn').onclick = (e) => {
            e.stopPropagation();
            playNext();
        };
        
        // Expanded player controls
        document.getElementById('expandedPlayPauseBtn').onclick = togglePlayPause;
        document.getElementById('expandedPrevBtn').onclick = playPrev;
        document.getElementById('expandedNextBtn').onclick = playNext;
        document.getElementById('expandedLikeBtn').onclick = toggleLike;
        document.getElementById('expandedPlaylistBtn').onclick = addCurrentToPlaylist;
        document.getElementById('expandedProgressBar').onclick = (e) => seek(e, 'expandedProgressBar');
        
        // Open/close expanded player
        document.getElementById('miniPlayer').onclick = expandPlayer;
        document.getElementById('closeExpandedBtn').onclick = collapsePlayer;
        document.getElementById('closeExpandedBtn2').onclick = collapsePlayer;
        
        // Search
        let searchTimeout;
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length >= 2) {
                searchTimeout = setTimeout(() => searchTracks(query), 500);
            }
        });
        
        // ===== ЗАПУСК =====
        initProfile();
        switchTab('search');
    </script>
</body>
</html>
