<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            padding: 8px 20px 12px;
            z-index: 100;
        }
        
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .tab.active { color: #1ed760; }
        .tab-icon { font-size: 22px; }
        
        /* Main Content */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 80px;
            overflow-y: auto;
            padding: 20px 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        
        .header { margin-bottom: 24px; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .header p { font-size: 15px; opacity: 0.7; }
        
        /* Search */
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-bottom: 20px;
        }
        .search-box:focus { outline: none; background: rgba(255, 255, 255, 0.15); }
        .search-box::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        /* Track List */
        .track-list { display: flex; flex-direction: column; gap: 8px; }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .track-item:active { background: rgba(255, 255, 255, 0.1); }
        
        .track-cover { width: 52px; height: 52px; border-radius: 8px; flex-shrink: 0; background: #1ed760; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 13px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-duration { font-size: 13px; opacity: 0.5; flex-shrink: 0; }
        
        /* Mini Player */
        .mini-player {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            z-index: 101;
            transform: translateY(0);
            transition: transform 0.3s;
            cursor: pointer;
        }
        .mini-player.hidden { transform: translateY(100%); }
        
        .mini-player-content { display: flex; align-items: center; gap: 12px; }
        .mini-player-cover { width: 48px; height: 48px; border-radius: 8px; flex-shrink: 0; background: #1ed760; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .mini-player-info { flex: 1; min-width: 0; }
        .mini-player-title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-player-artist { font-size: 12px; opacity: 0.7; }
        .mini-player-controls { display: flex; gap: 16px; }
        .mini-player-btn {
            background: none; border: none; color: #fff; font-size: 20px;
            cursor: pointer; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .mini-player-btn:active { background: rgba(255,255,255,0.1); }
        .mini-player-btn.play { font-size: 28px; }
        
        /* Expanded Player */
        .expanded-player {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #000; z-index: 200; transform: translateY(100%);
            transition: transform 0.3s; display: flex; flex-direction: column;
            overflow-y: auto;
        }
        .expanded-player.active { transform: translateY(0); }
        
        .expanded-header {
            display: flex; justify-content: space-between;
            padding: 20px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .expanded-close {
            background: none; border: none; color: #fff; font-size: 24px;
            cursor: pointer; width: 40px; height: 40px; border-radius: 50%;
        }
        .expanded-close:active { background: rgba(255,255,255,0.1); }
        
        .expanded-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .expanded-cover { width: 280px; height: 280px; border-radius: 16px; margin-bottom: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); background: #1ed760; display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .expanded-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .expanded-artist { font-size: 16px; opacity: 0.7; text-align: center; margin-bottom: 32px; }
        
        .expanded-controls { display: flex; gap: 40px; margin-bottom: 24px; }
        .expanded-control-btn {
            background: none; border: none; color: #fff; font-size: 28px;
            cursor: pointer; width: 56px; height: 56px; border-radius: 50%;
        }
        .expanded-control-btn:active { transform: scale(0.95); }
        .expanded-control-btn.play { background: #1ed760; color: #000; font-size: 32px; width: 64px; height: 64px; }
        
        .progress-bar { width: 100%; max-width: 400px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; margin-bottom: 8px; }
        .progress-fill { width: 0%; height: 100%; background: #1ed760; border-radius: 2px; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.5; width: 100%; max-width: 400px; }
        
        .expanded-actions { display: flex; justify-content: center; gap: 30px; margin-top: 24px; }
        .expanded-actions button { background: rgba(255,255,255,0.1); border: none; padding: 10px 24px; border-radius: 30px; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .queue-section { width: 100%; max-width: 500px; margin-top: 24px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 16px; }
        .queue-title { font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .queue-list { max-height: 300px; overflow-y: auto; }
        .queue-item {
            padding: 10px 0; display: flex; align-items: center; gap: 12px;
            cursor: pointer; border-bottom: 0.5px solid rgba(255,255,255,0.05);
        }
        .queue-item.active { color: #1ed760; }
        
        .empty-state, .loading { text-align: center; padding: 60px 20px; opacity: 0.5; }
        .hidden { display: none; }
        
        /* Toast */
        .toast {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #fff; padding: 8px 16px;
            border-radius: 30px; font-size: 14px; z-index: 150;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        
        /* Profile */
        .profile-section { text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; background: linear-gradient(135deg, #1db954 0%, #191414 100%); }
        .profile-name { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .profile-username { font-size: 15px; opacity: 0.7; margin-bottom: 24px; }
        .stats-row { display: flex; justify-content: space-around; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 24px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-label { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .create-playlist-btn { width: 100%; padding: 14px; background: #1ed760; color: #000; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; margin-bottom: 20px; cursor: pointer; }
        .playlist-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
        .playlist-card:active { background: rgba(255,255,255,0.1); }
        .playlist-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        
        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            justify-content: center; z-index: 300; visibility: hidden; opacity: 0;
            transition: all 0.3s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { background: #121212; border-radius: 20px; padding: 24px; width: 90%; max-width: 320px; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
        .modal-buttons button:first-child { background: #1ed760; color: #000; }
        .modal-buttons button:last-child { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab active" data-tab="search"><div class="tab-icon">🔍</div><span>Поиск</span></button>
        <button class="tab" data-tab="library"><div class="tab-icon">❤️</div><span>Любимое</span></button>
        <button class="tab" data-tab="playlists"><div class="tab-icon">📀</div><span>Плейлисты</span></button>
        <button class="tab" data-tab="profile"><div class="tab-icon">👤</div><span>Профиль</span></button>
    </div>
    
    <div class="main-content" id="mainContent">
        <div id="search-tab">
            <div class="header"><h1>Поиск</h1><p>Найди и слушай любую музыку</p></div>
            <input type="text" class="search-box" id="searchInput" placeholder="Что хочешь послушать?" autofocus>
            <div id="searchResults" class="track-list"></div>
        </div>
        <div id="library-tab" class="hidden">
            <div class="header"><h1>Любимое</h1><p>Треки, которые тебе понравились</p></div>
            <div id="libraryList" class="track-list"></div>
        </div>
        <div id="playlists-tab" class="hidden">
            <div class="header"><h1>Плейлисты</h1><p>Создавай подборки</p></div>
            <button class="create-playlist-btn" id="createPlaylistBtn">+ Новый плейлист</button>
            <div id="playlistsList"></div>
        </div>
        <div id="profile-tab" class="hidden">
            <div class="profile-section">
                <div class="avatar" id="avatar">🎵</div>
                <div class="profile-name" id="displayName"></div>
                <div class="profile-username" id="username"></div>
                <div class="stats-row">
                    <div class="stat-item"><div class="stat-value" id="likesCount">0</div><div class="stat-label">Лайков</div></div>
                    <div class="stat-item"><div class="stat-value" id="playlistsCount">0</div><div class="stat-label">Плейлистов</div></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Mini Player -->
    <div class="mini-player hidden" id="miniPlayer">
        <div class="mini-player-content">
            <div class="mini-player-cover" id="miniCover">🎵</div>
            <div class="mini-player-info">
                <div class="mini-player-title" id="miniTitle">Выберите трек</div>
                <div class="mini-player-artist" id="miniArtist"></div>
            </div>
            <div class="mini-player-controls">
                <button class="mini-player-btn" id="miniPrevBtn">⏮️</button>
                <button class="mini-player-btn play" id="miniPlayPauseBtn">▶️</button>
                <button class="mini-player-btn" id="miniNextBtn">⏭️</button>
            </div>
        </div>
    </div>
    
    <!-- Expanded Player -->
    <div class="expanded-player" id="expandedPlayer">
        <div class="expanded-header">
            <button class="expanded-close" id="closeExpandedBtn">↓</button>
            <div></div>
            <button class="expanded-close" id="closeExpandedBtn2">✕</button>
        </div>
        <div class="expanded-content">
            <div class="expanded-cover" id="expandedCover">🎵</div>
            <div class="expanded-title" id="expandedTitle">Выберите трек</div>
            <div class="expanded-artist" id="expandedArtist"></div>
            <div class="progress-bar" id="expandedProgressBar"><div class="progress-fill" id="expandedProgressFill"></div></div>
            <div class="time-info"><span id="expandedCurrentTime">0:00</span><span id="expandedTotalTime">0:00</span></div>
            <div class="expanded-controls">
                <button class="expanded-control-btn" id="expandedPrevBtn">⏮️</button>
                <button class="expanded-control-btn play" id="expandedPlayPauseBtn">▶️</button>
                <button class="expanded-control-btn" id="expandedNextBtn">⏭️</button>
            </div>
            <div class="expanded-actions">
                <button id="expandedLikeBtn">🤍 Лайк</button>
                <button id="expandedPlaylistBtn">📀 В плейлист</button>
            </div>
            <div class="queue-section">
                <div class="queue-title"><span>Очередь</span><span id="queueCount">0 треков</span></div>
                <div class="queue-list" id="expandedQueueList"></div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <!-- Modals -->
    <div class="modal" id="playlistModal">
        <div class="modal-content">
            <h3>Новый плейлист</h3>
            <input type="text" id="playlistName" placeholder="Название плейлиста">
            <div class="modal-buttons">
                <button onclick="window.createPlaylist()">Создать</button>
                <button onclick="window.closePlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    <div class="modal" id="addToPlaylistModal">
        <div class="modal-content">
            <h3>Добавить в плейлист</h3>
            <div id="playlistSelect"></div>
            <div class="modal-buttons">
                <button onclick="window.closeAddToPlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        (function(){
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            const telegramId = tg.initDataUnsafe?.user?.id;
            const telegramUsername = tg.initDataUnsafe?.user?.username || '';
            const telegramFirstName = tg.initDataUnsafe?.user?.first_name || '';
            
            // ==================== СОСТОЯНИЕ ====================
            let currentTab = 'search';
            let currentTrack = null;
            let queue = [];
            let queueIndex = 0;
            let audio = new Audio();
            let isPlaying = false;
            let likedTracks = new Map();
            let userPlaylists = [];
            let currentTrackForPlaylist = null;
            
            // DOM
            const miniPlayer = document.getElementById('miniPlayer');
            const expandedPlayer = document.getElementById('expandedPlayer');
            
            // ==================== УТИЛИТЫ ====================
            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }
            
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function formatTime(sec) {
                if (isNaN(sec)) return '0:00';
                const mins = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return `${mins}:${s.toString().padStart(2, '0')}`;
            }
            
            function getGradient(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
                const hue1 = Math.abs(hash % 360);
                const hue2 = (hue1 + 40) % 360;
                return `linear-gradient(135deg, hsl(${hue1}, 70%, 50%) 0%, hsl(${hue2}, 70%, 40%) 100%)`;
            }
            
            // ==================== API ====================
            const cache = new Map();
            async function fetchAPI(endpoint, options = {}) {
                const key = endpoint + JSON.stringify(options);
                if (cache.has(key)) return cache.get(key);
                const response = await fetch(endpoint, options);
                const data = await response.json();
                cache.set(key, data);
                setTimeout(() => cache.delete(key), 30000);
                return data;
            }
            
            // ==================== ПРОФИЛЬ ====================
            async function loadProfile() {
                if (!telegramId) return;
                const profile = await fetchAPI(`/api/profile/${telegramId}`);
                if (profile.exists) {
                    document.getElementById('displayName').textContent = profile.display_name || telegramFirstName;
                    document.getElementById('username').textContent = `@${telegramUsername || 'user'}`;
                    if (profile.stats) {
                        document.getElementById('likesCount').textContent = profile.stats.likes;
                        document.getElementById('playlistsCount').textContent = profile.stats.playlists;
                    }
                }
                await loadLikes();
                await loadPlaylists();
            }
            
            // ==================== ЛАЙКИ ====================
            async function loadLikes() {
                if (!telegramId) return;
                const likes = await fetchAPI(`/api/likes/${telegramId}`);
                likedTracks.clear();
                likes.forEach(like => likedTracks.set(like.track_id, like));
                document.getElementById('likesCount').textContent = likes.length;
                updateLikeButton();
                
                const container = document.getElementById('libraryList');
                if (!likes.length) {
                    container.innerHTML = '<div class="empty-state">Нет сохранённых треков</div>';
                    return;
                }
                container.innerHTML = '';
                likes.forEach(like => container.appendChild(createTrackElement(like)));
            }
            
            async function toggleLike() {
                if (!currentTrack) return;
                const isLiked = likedTracks.has(currentTrack.track_id);
                if (isLiked) {
                    await fetchAPI(`/api/likes/${telegramId}?track_id=${currentTrack.track_id}`, { method: 'DELETE' });
                    likedTracks.delete(currentTrack.track_id);
                    showToast('Удалено из любимых');
                } else {
                    await fetchAPI(`/api/likes/${telegramId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            track_id: currentTrack.track_id,
                            title: currentTrack.title,
                            artist: currentTrack.artist,
                            url: currentTrack.url,
                            thumbnail: currentTrack.thumbnail || ''
                        })
                    });
                    likedTracks.set(currentTrack.track_id, currentTrack);
                    showToast('Добавлено в любимое');
                }
                updateLikeButton();
                document.getElementById('likesCount').textContent = likedTracks.size;
                loadLikes();
            }
            
            function updateLikeButton() {
                const btn = document.getElementById('expandedLikeBtn');
                if (currentTrack && likedTracks.has(currentTrack.track_id)) {
                    btn.innerHTML = '❤️ В любимых';
                    btn.style.opacity = '1';
                } else {
                    btn.innerHTML = '🤍 Лайк';
                    btn.style.opacity = '0.7';
                }
            }
            
            // ==================== ПЛЕЙЛИСТЫ ====================
            async function loadPlaylists() {
                if (!telegramId) return;
                const playlists = await fetchAPI(`/api/playlists/${telegramId}`);
                userPlaylists = playlists;
                document.getElementById('playlistsCount').textContent = playlists.length;
                const container = document.getElementById('playlistsList');
                if (!playlists.length) {
                    container.innerHTML = '<div class="empty-state">Нет плейлистов</div>';
                    return;
                }
                container.innerHTML = '';
                playlists.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'playlist-card';
                    div.innerHTML = `<div class="playlist-name">${escapeHtml(p.name)}</div><div style="font-size:12px;opacity:0.5">${new Date(p.created_at).toLocaleDateString()}</div>`;
                    div.onclick = () => openPlaylist(p);
                    container.appendChild(div);
                });
            }
            
            async function openPlaylist(playlist) {
                const tracks = await fetchAPI(`/api/playlists/${playlist.id}/tracks`);
                if (!tracks.length) { showToast('Плейлист пуст'); return; }
                setQueue(tracks);
                playTrack(tracks[0]);
            }
            
            window.createPlaylist = async () => {
                const name = document.getElementById('playlistName').value.trim();
                if (!name) { showToast('Введите название'); return; }
                await fetchAPI(`/api/playlists/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                closePlaylistModal();
                loadPlaylists();
                showToast('Плейлист создан');
            };
            
            async function addCurrentToPlaylist() {
                if (!currentTrack) return;
                if (!userPlaylists.length) { showToast('Создайте плейлист'); return; }
                const container = document.getElementById('playlistSelect');
                container.innerHTML = userPlaylists.map(p => `<button onclick="window.addTrackToPlaylist(${p.id})" style="width:100%;padding:12px;margin-bottom:8px;background:rgba(255,255,255,0.1);border:none;border-radius:12px;color:#fff;cursor:pointer"><strong>${escapeHtml(p.name)}</strong></button>`).join('');
                document.getElementById('addToPlaylistModal').classList.add('active');
            }
            
            window.addTrackToPlaylist = async (playlistId) => {
                await fetchAPI(`/api/playlists/${playlistId}/tracks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        track_id: currentTrack.track_id,
                        title: currentTrack.title,
                        artist: currentTrack.artist,
                        url: currentTrack.url,
                        thumbnail: currentTrack.thumbnail || ''
                    })
                });
                closeAddToPlaylistModal();
                showToast('Добавлено в плейлист');
            };
            
            // ==================== ОЧЕРЕДЬ И ПЛЕЕР ====================
            function setQueue(tracks) {
                queue = tracks.map((t, i) => ({ ...t, track_id: t.track_id || `track_${i}_${Date.now()}` }));
                queueIndex = 0;
                renderQueue();
            }
            
            function addToQueue(track) {
                queue.push({ ...track, track_id: track.track_id || `track_${Date.now()}_${Math.random()}` });
                renderQueue();
                showToast(`Добавлено в очередь (${queue.length})`);
            }
            
            function renderQueue() {
                const container = document.getElementById('expandedQueueList');
                const countSpan = document.getElementById('queueCount');
                countSpan.textContent = `${queue.length} треков`;
                if (!queue.length) { container.innerHTML = '<div style="text-align:center;padding:20px;opacity:0.5">Очередь пуста</div>'; return; }
                container.innerHTML = '';
                queue.forEach((track, idx) => {
                    const div = document.createElement('div');
                    div.className = `queue-item ${idx === queueIndex ? 'active' : ''}`;
                    div.innerHTML = `<div style="flex:1"><div style="font-weight:500">${escapeHtml(track.title)}</div><div style="font-size:12px;opacity:0.7">${escapeHtml(track.artist)}</div></div>`;
                    div.onclick = () => playTrackByIndex(idx);
                    container.appendChild(div);
                });
            }
            
            function playTrackByIndex(idx) {
                if (idx >= 0 && idx < queue.length) {
                    queueIndex = idx;
                    playTrack(queue[idx]);
                }
            }
            
            function updateMiniPlayer() {
                if (currentTrack) {
                    document.getElementById('miniTitle').textContent = currentTrack.title;
                    document.getElementById('miniArtist').textContent = currentTrack.artist;
                    document.getElementById('expandedTitle').textContent = currentTrack.title;
                    document.getElementById('expandedArtist').textContent = currentTrack.artist;
                    if (document.getElementById('expandedCover')) document.getElementById('expandedCover').style.background = getGradient(currentTrack.title);
                    if (document.getElementById('miniCover')) document.getElementById('miniCover').style.background = getGradient(currentTrack.title);
                    miniPlayer.classList.remove('hidden');
                } else {
                    miniPlayer.classList.add('hidden');
                }
            }
            
            // ==================== playTrack С ИНДИКАТОРОМ ЗАГРУЗКИ ====================
            let isLoading = false;
            
            async function playTrack(track) {
                if (isLoading) {
                    showToast('⏳ Подождите, трек уже загружается');
                    return;
                }
                
                currentTrack = track;
                updateMiniPlayer();
                updateLikeButton();
                
                isLoading = true;
                showToast('⏳ Загрузка трека...');
                
                const miniPlayBtn = document.getElementById('miniPlayPauseBtn');
                const expPlayBtn = document.getElementById('expandedPlayPauseBtn');
                const originalMiniText = miniPlayBtn?.textContent;
                const originalExpText = expPlayBtn?.textContent;
                if (miniPlayBtn) miniPlayBtn.textContent = '⏳';
                if (expPlayBtn) expPlayBtn.textContent = '⏳';
                
                const data = await fetchAPI(`/download?url=${encodeURIComponent(track.url)}`);
                
                if (miniPlayBtn) miniPlayBtn.textContent = originalMiniText || '▶️';
                if (expPlayBtn) expPlayBtn.textContent = originalExpText || '▶️';
                isLoading = false;
                
                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                    isPlaying = true;
                    updatePlayButtons(true);
                    showToast('🎵 Играет');
                } else {
                    showToast('❌ Ошибка загрузки');
                }
            }
            
            function playNext() { 
                if (queueIndex + 1 < queue.length) { 
                    queueIndex++; 
                    playTrack(queue[queueIndex]); 
                } else { 
                    showToast('Очередь закончилась'); 
                } 
            }
            
            function playPrev() { 
                if (queueIndex - 1 >= 0) { 
                    queueIndex--; 
                    playTrack(queue[queueIndex]); 
                } 
            }
            
            function togglePlayPause() { 
                isPlaying ? audio.pause() : audio.play(); 
            }
            
            function updatePlayButtons(playing) { 
                const miniPlay = document.getElementById('miniPlayPauseBtn');
                const expPlay = document.getElementById('expandedPlayPauseBtn');
                if (miniPlay) miniPlay.textContent = playing ? '⏸️' : '▶️';
                if (expPlay) expPlay.textContent = playing ? '⏸️' : '▶️';
            }
            
            // Аудио события
            audio.onplay = () => { isPlaying = true; updatePlayButtons(true); };
            audio.onpause = () => { isPlaying = false; updatePlayButtons(false); };
            audio.onended = () => playNext();
            audio.ontimeupdate = () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    const fill = document.getElementById('expandedProgressFill');
                    const current = document.getElementById('expandedCurrentTime');
                    const total = document.getElementById('expandedTotalTime');
                    if (fill) fill.style.width = `${percent}%`;
                    if (current) current.textContent = formatTime(audio.currentTime);
                    if (total) total.textContent = formatTime(audio.duration);
                }
            };
            
            function seek(e) {
                const rect = document.getElementById('expandedProgressBar');
                if (!rect) return;
                const percent = (e.clientX - rect.getBoundingClientRect().left) / rect.clientWidth;
                if (audio.duration) audio.currentTime = percent * audio.duration;
            }
            
            // ==================== СОЗДАНИЕ ЭЛЕМЕНТА ТРЕКА ====================
            function createTrackElement(track) {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.style.background = 'rgba(255,255,255,0.05)';
                div.innerHTML = `<div class="track-cover" style="background:${getGradient(track.title)}">🎵</div>
                                 <div class="track-info"><div class="track-title">${escapeHtml(track.title)}</div><div class="track-artist">${escapeHtml(track.artist)}</div></div>
                                 <div class="track-duration">${formatTime(track.duration)}</div>`;
                
                div.onclick = () => {
                    setQueue([track]);
                    playTrack(track);
                };
                
                return div;
            }
            
            // ==================== ПОИСК ====================
            let searchTimeout;
            async function searchTracks(query) {
                const container = document.getElementById('searchResults');
                if (!container) return;
                container.innerHTML = '<div class="loading">Поиск...</div>';
                const tracks = await fetchAPI(`/search?q=${encodeURIComponent(query)}`);
                if (!tracks || !tracks.length) { 
                    container.innerHTML = '<div class="empty-state">Ничего не найдено</div>'; 
                    return; 
                }
                container.innerHTML = '';
                tracks.forEach(t => container.appendChild(createTrackElement({ ...t, track_id: t.id })));
            }
            
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    const q = e.target.value.trim();
                    if (q.length >= 2) searchTimeout = setTimeout(() => searchTracks(q), 300);
                });
            }
            
            // ==================== НАВИГАЦИЯ ====================
            function switchTab(tabId) {
                currentTab = tabId;
                document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
                const searchTab = document.getElementById('search-tab');
                const libraryTab = document.getElementById('library-tab');
                const playlistsTab = document.getElementById('playlists-tab');
                const profileTab = document.getElementById('profile-tab');
                if (searchTab) searchTab.classList.toggle('hidden', tabId !== 'search');
                if (libraryTab) libraryTab.classList.toggle('hidden', tabId !== 'library');
                if (playlistsTab) playlistsTab.classList.toggle('hidden', tabId !== 'playlists');
                if (profileTab) profileTab.classList.toggle('hidden', tabId !== 'profile');
                if (tabId === 'library') loadLikes();
                if (tabId === 'playlists') loadPlaylists();
            }
            
            document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
            
            // ==================== МОДАЛКИ ====================
            window.closePlaylistModal = () => { 
                const modal = document.getElementById('playlistModal');
                const input = document.getElementById('playlistName');
                if (modal) modal.classList.remove('active');
                if (input) input.value = '';
            };
            window.closeAddToPlaylistModal = () => {
                const modal = document.getElementById('addToPlaylistModal');
                if (modal) modal.classList.remove('active');
            };
            
            const createPlaylistBtn = document.getElementById('createPlaylistBtn');
            if (createPlaylistBtn) {
                createPlaylistBtn.onclick = () => {
                    const modal = document.getElementById('playlistModal');
                    if (modal) modal.classList.add('active');
                };
            }
            
            // Плеер кнопки
            const expandPlayer = () => { renderQueue(); if (expandedPlayer) expandedPlayer.classList.add('active'); };
            const collapsePlayer = () => { if (expandedPlayer) expandedPlayer.classList.remove('active'); };
            
            const miniPrev = document.getElementById('miniPrevBtn');
            const miniPlay = document.getElementById('miniPlayPauseBtn');
            const miniNext = document.getElementById('miniNextBtn');
            const expPrev = document.getElementById('expandedPrevBtn');
            const expPlay = document.getElementById('expandedPlayPauseBtn');
            const expNext = document.getElementById('expandedNextBtn');
            const expLike = document.getElementById('expandedLikeBtn');
            const expPlaylist = document.getElementById('expandedPlaylistBtn');
            const progressBar = document.getElementById('expandedProgressBar');
            const closeBtn1 = document.getElementById('closeExpandedBtn');
            const closeBtn2 = document.getElementById('closeExpandedBtn2');
            
            if (miniPrev) miniPrev.onclick = (e) => { e.stopPropagation(); playPrev(); };
            if (miniPlay) miniPlay.onclick = (e) => { e.stopPropagation(); togglePlayPause(); };
            if (miniNext) miniNext.onclick = (e) => { e.stopPropagation(); playNext(); };
            if (expPrev) expPrev.onclick = playPrev;
            if (expPlay) expPlay.onclick = togglePlayPause;
            if (expNext) expNext.onclick = playNext;
            if (expLike) expLike.onclick = toggleLike;
            if (expPlaylist) expPlaylist.onclick = addCurrentToPlaylist;
            if (progressBar) progressBar.onclick = seek;
            if (miniPlayer) miniPlayer.onclick = expandPlayer;
            if (closeBtn1) closeBtn1.onclick = collapsePlayer;
            if (closeBtn2) closeBtn2.onclick = collapsePlayer;
            
            // ==================== ЗАПУСК ====================
            loadProfile();
            switchTab('search');
        })();
    </script>
</body>
</html>
