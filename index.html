<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 0;
            margin: 0;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--tg-theme-hint-color, #e0e0e0);
            display: flex;
            padding: 8px 20px 12px 20px;
            z-index: 100;
        }
        
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .tab.active {
            color: var(--tg-theme-button-color, #007aff);
        }
        
        .tab-icon {
            font-size: 22px;
        }
        
        /* Main Content */
        .main-content {
            padding: 20px 16px 80px 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        
        .header p {
            font-size: 15px;
            opacity: 0.7;
        }
        
        /* Search */
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            color: var(--tg-theme-text-color, #000000);
            margin-bottom: 20px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #007aff);
        }
        
        /* Track List */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        
        .track-item:active {
            transform: scale(0.98);
        }
        
        .track-cover {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .track-info {
            flex: 1;
            min-width: 0;
        }
        
        .track-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-artist {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            transition: transform 0.1s ease;
        }
        
        .like-btn:active {
            transform: scale(0.9);
        }
        
        .track-duration {
            font-size: 13px;
            opacity: 0.5;
            min-width: 40px;
            text-align: right;
        }
        
        /* Profile Section */
        .profile-section {
            text-align: center;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .profile-username {
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 24px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 20px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }
        
        /* Player */
        .player {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--tg-theme-hint-color, #e0e0e0);
            padding: 12px 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }
        
        .player.active {
            transform: translateY(0);
        }
        
        .player-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        audio {
            width: 100%;
            border-radius: 12px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab" data-tab="search">
            <div class="tab-icon">🔍</div>
            <span>Поиск</span>
        </button>
        <button class="tab" data-tab="library">
            <div class="tab-icon">📚</div>
            <span>Моя музыка</span>
        </button>
        <button class="tab" data-tab="profile">
            <div class="tab-icon">👤</div>
            <span>Профиль</span>
        </button>
    </div>
    
    <div class="main-content">
        <!-- Поиск -->
        <div id="search-tab">
            <div class="header">
                <h1>Music Bot</h1>
                <p>Найди и слушай любую музыку</p>
            </div>
            <input type="text" class="search-box" id="searchInput" placeholder="Поиск песен, исполнителей..." autofocus>
            <div class="track-list" id="searchResults"></div>
        </div>
        
        <!-- Библиотека -->
        <div id="library-tab" class="hidden">
            <div class="header">
                <h1>Моя музыка</h1>
                <p>Любимые треки</p>
            </div>
            <div class="track-list" id="libraryList"></div>
        </div>
        
        <!-- Профиль -->
        <div id="profile-tab" class="hidden">
            <div class="profile-section">
                <div class="avatar" id="avatar">🎵</div>
                <div class="profile-name" id="displayName"></div>
                <div class="profile-username" id="username"></div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="likesCount">0</div>
                        <div class="stat-label">Лайков</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="player" id="player">
        <div class="player-title" id="playerTitle"></div>
        <audio id="audio" controls preload="none"></audio>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const telegramId = tg.initDataUnsafe?.user?.id;
        const telegramUsername = tg.initDataUnsafe?.user?.username || '';
        const telegramFirstName = tg.initDataUnsafe?.user?.first_name || '';
        
        let currentTab = 'search';
        let currentAudio = null;
        let currentUrl = null;
        let likedTracks = new Map();
        
        // Инициализация профиля
        async function initProfile() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/profile/${telegramId}`);
            const profile = await response.json();
            
            if (!profile.exists) {
                await fetch(`/api/profile/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: telegramUsername,
                        display_name: telegramFirstName,
                        avatar_url: ''
                    })
                });
            }
            
            document.getElementById('displayName').textContent = profile.display_name || telegramFirstName;
            document.getElementById('username').textContent = `@${telegramUsername || 'user'}`;
            
            await loadLikes();
        }
        
        // Загрузка лайков
        async function loadLikes() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/likes/${telegramId}`);
            const likes = await response.json();
            
            likedTracks.clear();
            likes.forEach(like => {
                likedTracks.set(like.track_id, like);
            });
            
            document.getElementById('likesCount').textContent = likes.length;
            
            // Обновляем библиотеку
            const libraryList = document.getElementById('libraryList');
            if (likes.length === 0) {
                libraryList.innerHTML = '<div class="empty-state">Нет сохранённых треков<br>❤️ Лайкайте музыку, чтобы она появилась здесь</div>';
            } else {
                libraryList.innerHTML = '';
                likes.forEach(like => {
                    libraryList.appendChild(createTrackElement(like, true));
                });
            }
        }
        
        // Создание элемента трека
        function createTrackElement(track, isLiked = false) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                </div>
                <div class="track-actions">
                    <button class="like-btn" data-id="${track.track_id || track.id}" data-liked="${isLiked}">
                        ${isLiked ? '❤️' : '🤍'}
                    </button>
                    <div class="track-duration">${formatDuration(track.duration)}</div>
                </div>
            `;
            
            div.onclick = (e) => {
                if (e.target.classList.contains('like-btn')) return;
                playTrack(track.url, track.title);
            };
            
            const likeBtn = div.querySelector('.like-btn');
            likeBtn.onclick = async (e) => {
                e.stopPropagation();
                const trackId = likeBtn.dataset.id;
                const isCurrentlyLiked = likeBtn.dataset.liked === 'true';
                
                if (isCurrentlyLiked) {
                    await fetch(`/api/likes/${telegramId}?track_id=${trackId}`, { method: 'DELETE' });
                    likeBtn.innerHTML = '🤍';
                    likeBtn.dataset.liked = 'false';
                } else {
                    await fetch(`/api/likes/${telegramId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            track_id: trackId,
                            title: track.title,
                            artist: track.artist,
                            url: track.url,
                            thumbnail: track.thumbnail
                        })
                    });
                    likeBtn.innerHTML = '❤️';
                    likeBtn.dataset.liked = 'true';
                }
                await loadLikes();
                if (currentTab === 'search' && searchResults) {
                    refreshSearchResults();
                }
            };
            
            return div;
        }
        
        async function searchTracks(query) {
            const searchResults = document.getElementById('searchResults');
            searchResults.innerHTML = '<div class="loading">Поиск...</div>';
            
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (!tracks || tracks.length === 0) {
                    searchResults.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                    return;
                }
                
                searchResults.innerHTML = '';
                tracks.forEach(track => {
                    const isLiked = likedTracks.has(track.id);
                    searchResults.appendChild(createTrackElement({
                        ...track,
                        track_id: track.id
                    }, isLiked));
                });
            } catch (e) {
                console.error(e);
                searchResults.innerHTML = '<div class="empty-state">Ошибка поиска</div>';
            }
        }
        
        async function refreshSearchResults() {
            const query = document.getElementById('searchInput').value;
            if (query.length >= 2) {
                await searchTracks(query);
            }
        }
        
        async function playTrack(url, title) {
            const player = document.getElementById('player');
            const audio = document.getElementById('audio');
            const playerTitle = document.getElementById('playerTitle');
            
            if (currentUrl === url && !audio.paused) return;
            
            playerTitle.textContent = title;
            player.classList.add('active');
            currentUrl = url;
            
            try {
                const response = await fetch(`/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                } else {
                    playerTitle.textContent = 'Ошибка загрузки';
                }
            } catch (e) {
                playerTitle.textContent = 'Ошибка загрузки';
            }
        }
        
        function formatDuration(seconds) {
            if (!seconds || seconds === 0) return '?';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Tab переключение
        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            
            document.getElementById('search-tab').classList.add('hidden');
            document.getElementById('library-tab').classList.add('hidden');
            document.getElementById('profile-tab').classList.add('hidden');
            
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
            
            if (tabId === 'library') {
                loadLikes();
            }
        }
        
        // Event listeners
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });
        
        let searchTimeout;
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length >= 2) {
                searchTimeout = setTimeout(() => searchTracks(query), 500);
            }
        });
        
        // Запуск
        initProfile();
        switchTab('search');
    </script>
</body>
</html>
