<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 0;
            margin: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 100px 16px;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        
        .header p {
            font-size: 15px;
            opacity: 0.7;
        }
        
        .search-container {
            margin-bottom: 24px;
        }
        
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #007aff);
        }
        
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease;
        }
        
        .track-item:active {
            transform: scale(0.98);
            background: var(--tg-theme-hint-color, #e0e0e0);
        }
        
        .track-cover {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .track-info {
            flex: 1;
            min-width: 0;
        }
        
        .track-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-artist {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-duration {
            font-size: 13px;
            opacity: 0.5;
            flex-shrink: 0;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }
        
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--tg-theme-hint-color, #e0e0e0);
            padding: 12px 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .player.active {
            transform: translateY(0);
        }
        
        .player-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        audio {
            width: 100%;
            border-radius: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.5;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .loading-dots {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Music Bot</h1>
            <p>Найди и слушай любую музыку</p>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-box" id="searchInput" placeholder="Поиск песен, исполнителей..." autofocus>
        </div>
        
        <div class="track-list" id="trackList">
            <div class="empty-state">Введите запрос для поиска</div>
        </div>
    </div>
    
    <div class="player" id="player">
        <div class="player-title" id="playerTitle"></div>
        <audio id="audio" controls preload="none"></audio>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let searchTimeout;
        let currentAudio = null;
        let currentUrl = null;
        
        function sendSearch(query) {
            tg.sendData(JSON.stringify({ action: 'search', query: query }));
            tg.close();
        }
        
        async function searchTracks(query) {
            const trackList = document.getElementById('trackList');
            trackList.innerHTML = '<div class="loading"><span class="loading-dots">Поиск</span></div>';
            
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (!tracks || tracks.length === 0) {
                    trackList.innerHTML = '<div class="empty-state">Ничего не найдено<br>Попробуйте другой запрос</div>';
                    return;
                }
                
                trackList.innerHTML = '';
                tracks.forEach(track => {
                    const trackEl = document.createElement('div');
                    trackEl.className = 'track-item';
                    trackEl.innerHTML = `
                        <div class="track-cover">🎵</div>
                        <div class="track-info">
                            <div class="track-title">${escapeHtml(track.title)}</div>
                            <div class="track-artist">${escapeHtml(track.artist)}</div>
                        </div>
                        <div class="track-duration">${formatDuration(track.duration)}</div>
                    `;
                    trackEl.onclick = () => playTrack(track.url, track.title);
                    trackList.appendChild(trackEl);
                });
            } catch (e) {
                console.error(e);
                trackList.innerHTML = '<div class="empty-state">Ошибка поиска<br>Попробуйте позже</div>';
            }
        }
        
        async function playTrack(url, title) {
            const player = document.getElementById('player');
            const audio = document.getElementById('audio');
            const playerTitle = document.getElementById('playerTitle');
            
            // Если уже играет этот же трек, ничего не делаем
            if (currentUrl === url && !audio.paused) {
                return;
            }
            
            playerTitle.textContent = title;
            player.classList.add('active');
            currentUrl = url;
            
            try {
                const response = await fetch(`/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                } else {
                    playerTitle.textContent = 'Ошибка загрузки трека';
                }
            } catch (e) {
                playerTitle.textContent = 'Ошибка загрузки трека';
            }
        }
        
        function formatDuration(seconds) {
            if (!seconds || seconds === 0) return '?';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length >= 2) {
                searchTimeout = setTimeout(() => searchTracks(query), 500);
            } else if (query.length === 0) {
                document.getElementById('trackList').innerHTML = '<div class="empty-state">Введите запрос для поиска</div>';
            }
        });
        
        searchInput.focus();
    </script>
</body>
</html>
