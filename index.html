<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .track-item:hover {
            opacity: 0.8;
        }
        
        .track-cover {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: var(--tg-theme-hint-color, #cccccc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .track-artist {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .popular-tag {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            display: inline-block;
            margin-bottom: 12px;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            opacity: 0.7;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Music Bot</h1>
        <div class="subtitle">Найди и слушай музыку</div>
        
        <input type="text" class="search-box" id="searchInput" placeholder="Поиск песен, исполнителей..." autofocus>
        
        <div class="popular-tag">🔥 Популярные запросы</div>
        <div class="track-list" id="trackList">
            <div class="track-item" data-query="Imagine Dragons Believer">
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">Believer</div>
                    <div class="track-artist">Imagine Dragons</div>
                </div>
            </div>
            <div class="track-item" data-query="Billie Eilish What Was I Made For">
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">What Was I Made For?</div>
                    <div class="track-artist">Billie Eilish</div>
                </div>
            </div>
            <div class="track-item" data-query="Metallica Nothing Else Matters">
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">Nothing Else Matters</div>
                    <div class="track-artist">Metallica</div>
                </div>
            </div>
            <div class="track-item" data-query="Eminem Lose Yourself">
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">Lose Yourself</div>
                    <div class="track-artist">Eminem</div>
                </div>
            </div>
            <div class="track-item" data-query="Queen Bohemian Rhapsody">
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">Bohemian Rhapsody</div>
                    <div class="track-artist">Queen</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Отправка запроса в бот
        function sendSearch(query) {
            tg.sendData(JSON.stringify({ action: 'search', query: query }));
            tg.close();
        }
        
        // Обработка кликов по трекам
        document.querySelectorAll('.track-item').forEach(item => {
            item.addEventListener('click', () => {
                const query = item.dataset.query;
                sendSearch(query);
            });
        });
        
        // Обработка поиска по Enter
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    sendSearch(query);
                }
            }
        });
        
        // Фокус на поиск
        searchInput.focus();
    </script>
</body>
</html>
