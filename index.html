<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .track-item:hover {
            opacity: 0.8;
        }
        
        .track-cover {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: var(--tg-theme-hint-color, #cccccc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .track-artist {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            opacity: 0.7;
        }
        
        .audio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            display: none;
        }
        
        .audio-player audio {
            width: 100%;
        }
        
        .player-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Music Bot</h1>
        <div class="subtitle">Найди и слушай музыку</div>
        
        <input type="text" class="search-box" id="searchInput" placeholder="Поиск песен, исполнителей..." autofocus>
        
        <div class="track-list" id="trackList">
            <div class="loading">Введите запрос для поиска...</div>
        </div>
    </div>
    
    <div class="audio-player" id="audioPlayer">
        <div class="player-title" id="playerTitle"></div>
        <audio id="audio" controls></audio>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let currentAudio = null;
        
        function sendSearch(query) {
            tg.sendData(JSON.stringify({ action: 'search', query: query }));
            tg.close();
        }
        
        async function searchTracks(query) {
            const trackList = document.getElementById('trackList');
            trackList.innerHTML = '<div class="loading">Поиск...</div>';
            
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (tracks.length === 0) {
                    trackList.innerHTML = '<div class="loading">Ничего не найдено. Попробуйте другой запрос.</div>';
                    return;
                }
                
                trackList.innerHTML = '';
                tracks.forEach(track => {
                    const trackEl = document.createElement('div');
                    trackEl.className = 'track-item';
                    trackEl.innerHTML = `
                        <div class="track-cover">🎵</div>
                        <div class="track-info">
                            <div class="track-title">${escapeHtml(track.title)}</div>
                            <div class="track-artist">${escapeHtml(track.artist)} • ${formatDuration(track.duration)}</div>
                        </div>
                    `;
                    trackEl.onclick = () => playTrack(track.url, track.title);
                    trackList.appendChild(trackEl);
                });
            } catch (e) {
                trackList.innerHTML = '<div class="loading">Ошибка поиска. Попробуйте позже.</div>';
            }
        }
        
        async function playTrack(url, title) {
            const playerDiv = document.getElementById('audioPlayer');
            const audio = document.getElementById('audio');
            const playerTitle = document.getElementById('playerTitle');
            
            playerTitle.textContent = title;
            playerDiv.style.display = 'block';
            
            try {
                const response = await fetch(`/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                } else {
                    playerTitle.textContent = 'Ошибка загрузки трека';
                }
            } catch (e) {
                playerTitle.textContent = 'Ошибка загрузки трека';
            }
        }
        
        function formatDuration(seconds) {
            if (!seconds) return '?';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        let searchTimeout;
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length > 2) {
                searchTimeout = setTimeout(() => searchTracks(query), 500);
            } else if (query.length === 0) {
                document.getElementById('trackList').innerHTML = '<div class="loading">Введите запрос для поиска...</div>';
            }
        });
        
        searchInput.focus();
    </script>
</body>
</html>
