<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            padding: 0;
            margin: 0;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            padding: 8px 20px 12px 20px;
            z-index: 100;
        }
        
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .tab.active {
            color: #1ed760;
        }
        
        .tab-icon {
            font-size: 22px;
        }
        
        /* Main Content */
        .main-content {
            padding: 20px 16px 100px 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        
        .header p {
            font-size: 15px;
            opacity: 0.7;
        }
        
        /* Search */
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            margin-bottom: 20px;
        }
        
        .search-box:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Track List */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .track-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .track-cover {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1db954 0%, #191414 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .track-info {
            flex: 1;
            min-width: 0;
        }
        
        .track-title {
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-artist {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-duration {
            font-size: 13px;
            opacity: 0.5;
            flex-shrink: 0;
        }
        
        /* Player (Spotify style) */
        .player {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }
        
        .player.active {
            transform: translateY(0);
        }
        
        .player-track-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .player-cover {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1db954 0%, #191414 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .player-track-details {
            flex: 1;
        }
        
        .player-track-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .player-track-artist {
            font-size: 13px;
            opacity: 0.7;
        }
        
        .player-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 16px;
        }
        
        .player-action-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #ffffff;
            transition: transform 0.1s ease;
        }
        
        .player-action-btn:active {
            transform: scale(0.95);
        }
        
        .player-action-btn.play-btn {
            font-size: 48px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1ed760;
            border-radius: 2px;
            transition: width 0.1s linear;
        }
        
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            opacity: 0.5;
        }
        
        .like-playlist-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 16px;
        }
        
        .like-playlist-buttons button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Queue */
        .queue {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            max-height: 50vh;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 98;
            overflow-y: auto;
        }
        
        .queue.active {
            transform: translateY(0);
        }
        
        .queue-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        
        .queue-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }
        
        .queue-item.active {
            background: rgba(30, 215, 96, 0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }
        
        .hidden {
            display: none;
        }
        
        /* Playlist Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: #121212;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-buttons button:first-child {
            background: #1ed760;
            color: black;
        }
        
        .modal-buttons button:last-child {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        /* Profile */
        .profile-section {
            text-align: center;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1db954 0%, #191414 100%);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .profile-username {
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 24px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        /* Create Playlist Button */
        .create-playlist-btn {
            width: 100%;
            padding: 14px;
            background: #1ed760;
            color: black;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        .playlist-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .playlist-card:active {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .playlist-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab" data-tab="search">
            <div class="tab-icon">🔍</div>
            <span>Поиск</span>
        </button>
        <button class="tab" data-tab="library">
            <div class="tab-icon">❤️</div>
            <span>Любимое</span>
        </button>
        <button class="tab" data-tab="playlists">
            <div class="tab-icon">📀</div>
            <span>Плейлисты</span>
        </button>
        <button class="tab" data-tab="profile">
            <div class="tab-icon">👤</div>
            <span>Профиль</span>
        </button>
    </div>
    
    <div class="main-content">
        <div id="search-tab">
            <div class="header">
                <h1>Поиск</h1>
                <p>Найди и слушай любую музыку</p>
            </div>
            <input type="text" class="search-box" id="searchInput" placeholder="Что хочешь послушать?" autofocus>
            <div class="track-list" id="searchResults"></div>
        </div>
        
        <div id="library-tab" class="hidden">
            <div class="header">
                <h1>Любимое</h1>
                <p>Треки, которые тебе понравились</p>
            </div>
            <div class="track-list" id="libraryList"></div>
        </div>
        
        <div id="playlists-tab" class="hidden">
            <div class="header">
                <h1>Плейлисты</h1>
                <p>Создавай подборки</p>
            </div>
            <button class="create-playlist-btn" id="createPlaylistBtn">+ Новый плейлист</button>
            <div id="playlistsList"></div>
        </div>
        
        <div id="profile-tab" class="hidden">
            <div class="profile-section">
                <div class="avatar" id="avatar">🎵</div>
                <div class="profile-name" id="displayName"></div>
                <div class="profile-username" id="username"></div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="likesCount">0</div>
                        <div class="stat-label">Лайков</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="playlistsCount">0</div>
                        <div class="stat-label">Плейлистов</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Player -->
    <div class="player" id="player">
        <div class="player-track-info">
            <div class="player-cover" id="playerCover">🎵</div>
            <div class="player-track-details">
                <div class="player-track-title" id="playerTitle">Выберите трек</div>
                <div class="player-track-artist" id="playerArtist"></div>
            </div>
        </div>
        
        <div class="player-actions">
            <button class="player-action-btn" id="prevBtn">⏮️</button>
            <button class="player-action-btn play-btn" id="playPauseBtn">▶️</button>
            <button class="player-action-btn" id="nextBtn">⏭️</button>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
        
        <div class="like-playlist-buttons">
            <button id="likeBtn">❤️ Лайк</button>
            <button id="playlistAddBtn">📀 В плейлист</button>
        </div>
    </div>
    
    <!-- Queue -->
    <div class="queue" id="queue">
        <div class="queue-header">
            <span>Очередь</span>
            <button style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" id="closeQueueBtn">✕</button>
        </div>
        <div id="queueList"></div>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="playlistModal">
        <div class="modal-content">
            <h3>Новый плейлист</h3>
            <input type="text" id="playlistName" placeholder="Название плейлиста">
            <div class="modal-buttons">
                <button onclick="createPlaylist()">Создать</button>
                <button onclick="closePlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="addToPlaylistModal">
        <div class="modal-content">
            <h3>Добавить в плейлист</h3>
            <div id="playlistSelect"></div>
            <div class="modal-buttons">
                <button onclick="closeAddToPlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const telegramId = tg.initDataUnsafe?.user?.id;
        const telegramUsername = tg.initDataUnsafe?.user?.username || '';
        const telegramFirstName = tg.initDataUnsafe?.user?.first_name || '';
        
        let currentTab = 'search';
        let currentTrack = null;
        let queue = [];
        let currentQueueIndex = 0;
        let audio = new Audio();
        let isPlaying = false;
        let likedTracks = new Map();
        let userPlaylists = [];
        let currentTrackForPlaylist = null;
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        async function initProfile() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/profile/${telegramId}`);
            const profile = await response.json();
            
            if (!profile.exists) {
                await fetch(`/api/profile/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: telegramUsername,
                        display_name: telegramFirstName
                    })
                });
            }
            
            document.getElementById('displayName').textContent = profile.display_name || telegramFirstName;
            document.getElementById('username').textContent = `@${telegramUsername || 'user'}`;
            
            if (profile.stats) {
                document.getElementById('likesCount').textContent = profile.stats.likes;
                document.getElementById('playlistsCount').textContent = profile.stats.playlists;
            }
            
            await loadLikes();
            await loadPlaylists();
        }
        
        // ===== ЛАЙКИ =====
        async function loadLikes() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/likes/${telegramId}`);
            const likes = await response.json();
            
            likedTracks.clear();
            likes.forEach(like => {
                likedTracks.set(like.track_id, like);
            });
            
            document.getElementById('likesCount').textContent = likes.length;
            updateLikeButton();
            
            const libraryList = document.getElementById('libraryList');
            if (likes.length === 0) {
                libraryList.innerHTML = '<div class="empty-state">Нет сохранённых треков<br>❤️ Лайкайте музыку</div>';
            } else {
                libraryList.innerHTML = '';
                likes.forEach(like => {
                    const div = createTrackElement(like);
                    libraryList.appendChild(div);
                });
            }
        }
        
        async function toggleLike() {
            if (!currentTrack || !telegramId) return;
            
            const isLiked = likedTracks.has(currentTrack.track_id);
            
            if (isLiked) {
                await fetch(`/api/likes/${telegramId}?track_id=${currentTrack.track_id}`, { method: 'DELETE' });
                likedTracks.delete(currentTrack.track_id);
            } else {
                await fetch(`/api/likes/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        track_id: currentTrack.track_id,
                        title: currentTrack.title,
                        artist: currentTrack.artist,
                        url: currentTrack.url,
                        thumbnail: currentTrack.thumbnail
                    })
                });
                likedTracks.set(currentTrack.track_id, currentTrack);
            }
            
            updateLikeButton();
            document.getElementById('likesCount').textContent = likedTracks.size;
            await loadLikes();
        }
        
        function updateLikeButton() {
            const likeBtn = document.getElementById('likeBtn');
            if (currentTrack && likedTracks.has(currentTrack.track_id)) {
                likeBtn.innerHTML = '❤️ Лайк (есть)';
                likeBtn.style.opacity = '1';
            } else {
                likeBtn.innerHTML = '🤍 Лайк';
                likeBtn.style.opacity = '0.7';
            }
        }
        
        // ===== ПЛЕЙЛИСТЫ =====
        async function loadPlaylists() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/playlists/${telegramId}`);
            userPlaylists = await response.json();
            
            document.getElementById('playlistsCount').textContent = userPlaylists.length;
            
            const playlistsList = document.getElementById('playlistsList');
            if (userPlaylists.length === 0) {
                playlistsList.innerHTML = '<div class="empty-state">У вас пока нет плейлистов<br>Создайте первый!</div>';
            } else {
                playlistsList.innerHTML = '';
                userPlaylists.forEach(playlist => {
                    const div = document.createElement('div');
                    div.className = 'playlist-card';
                    div.onclick = () => openPlaylist(playlist);
                    div.innerHTML = `
                        <div class="playlist-name">${escapeHtml(playlist.name)}</div>
                        <div style="font-size:12px; opacity:0.5;">${new Date(playlist.created_at).toLocaleDateString()}</div>
                    `;
                    playlistsList.appendChild(div);
                });
            }
        }
        
        async function openPlaylist(playlist) {
            const response = await fetch(`/api/playlists/${playlist.id}/tracks`);
            const tracks = await response.json();
            
            if (tracks.length === 0) {
                tg.showPopup({
                    title: playlist.name,
                    message: 'В плейлисте пока нет треков',
                    buttons: [{type: 'ok'}]
                });
            } else {
                setQueue(tracks);
                playTrack(tracks[0]);
            }
        }
        
        function createPlaylist() {
            const name = document.getElementById('playlistName').value.trim();
            if (!name) {
                tg.showPopup({title: 'Ошибка', message: 'Введите название плейлиста', buttons: [{type: 'ok'}]});
                return;
            }
            
            fetch(`/api/playlists/${telegramId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            }).then(() => {
                closePlaylistModal();
                loadPlaylists();
                tg.showPopup({title: 'Успех', message: 'Плейлист создан', buttons: [{type: 'ok'}]});
            });
        }
        
        async function addCurrentToPlaylist() {
            if (!currentTrack) return;
            currentTrackForPlaylist = currentTrack;
            
            if (userPlaylists.length === 0) {
                tg.showPopup({
                    title: 'Нет плейлистов',
                    message: 'Сначала создайте плейлист',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            const selectDiv = document.getElementById('playlistSelect');
            selectDiv.innerHTML = userPlaylists.map(playlist => `
                <button onclick="addTrackToPlaylist(${playlist.id})" style="width:100%; padding:12px; margin-bottom:8px; background:rgba(255,255,255,0.1); border:none; border-radius:12px; text-align:left; color:white; cursor:pointer;">
                    <strong>${escapeHtml(playlist.name)}</strong>
                </button>
            `).join('');
            
            document.getElementById('addToPlaylistModal').classList.add('active');
        }
        
        async function addTrackToPlaylist(playlistId) {
            await fetch(`/api/playlists/${playlistId}/tracks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    track_id: currentTrackForPlaylist.track_id,
                    title: currentTrackForPlaylist.title,
                    artist: currentTrackForPlaylist.artist,
                    url: currentTrackForPlaylist.url,
                    thumbnail: currentTrackForPlaylist.thumbnail
                })
            });
            closeAddToPlaylistModal();
            tg.showPopup({title: 'Успех', message: 'Трек добавлен в плейлист', buttons: [{type: 'ok'}]});
        }
        
        // ===== ОЧЕРЕДЬ И ПЛЕЕР =====
        function setQueue(tracks) {
            queue = tracks.map((track, idx) => ({
                ...track,
                track_id: track.track_id || `track_${idx}_${Date.now()}`
            }));
            currentQueueIndex = 0;
            renderQueue();
        }
        
        function addToQueue(track) {
            queue.push({
                ...track,
                track_id: track.track_id || `track_${Date.now()}_${Math.random()}`
            });
            renderQueue();
        }
        
        function renderQueue() {
            const queueList = document.getElementById('queueList');
            if (queue.length === 0) {
                queueList.innerHTML = '<div class="empty-state">Очередь пуста</div>';
                return;
            }
            
            queueList.innerHTML = queue.map((track, idx) => `
                <div class="queue-item ${idx === currentQueueIndex ? 'active' : ''}" onclick="playTrackByIndex(${idx})">
                    <div style="flex:1;">
                        <div style="font-weight:500;">${escapeHtml(track.title)}</div>
                        <div style="font-size:12px; opacity:0.7;">${escapeHtml(track.artist)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function playTrackByIndex(index) {
            if (index >= 0 && index < queue.length) {
                currentQueueIndex = index;
                playTrack(queue[currentQueueIndex]);
            }
        }
        
        async function playTrack(track) {
            currentTrack = track;
            
            document.getElementById('playerTitle').textContent = track.title;
            document.getElementById('playerArtist').textContent = track.artist;
            updateLikeButton();
            
            // Сохраняем в историю
            if (telegramId) {
                await fetch(`/api/history/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        track_id: track.track_id,
                        title: track.title,
                        artist: track.artist
                    })
                });
            }
            
            // Загружаем аудио
            const response = await fetch(`/download?url=${encodeURIComponent(track.url)}`);
            const data = await response.json();
            
            if (data.url) {
                audio.src = data.url;
                audio.play();
                isPlaying = true;
                document.getElementById('playPauseBtn').textContent = '⏸️';
                document.getElementById('player').classList.add('active');
            } else {
                tg.showPopup({title: 'Ошибка', message: 'Не удалось загрузить трек', buttons: [{type: 'ok'}]});
            }
        }
        
        function playNext() {
            if (currentQueueIndex + 1 < queue.length) {
                currentQueueIndex++;
                playTrack(queue[currentQueueIndex]);
            }
        }
        
        function playPrev() {
            if (currentQueueIndex - 1 >= 0) {
                currentQueueIndex--;
                playTrack(queue[currentQueueIndex]);
            }
        }
        
        // Аудио события
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressFill').style.width = `${percent}%`;
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('totalTime').textContent = formatTime(audio.duration);
            }
        });
        
        audio.addEventListener('ended', () => {
            playNext();
        });
        
        audio.addEventListener('play', () => {
            isPlaying = true;
            document.getElementById('playPauseBtn').textContent = '⏸️';
        });
        
        audio.addEventListener('pause', () => {
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = '▶️';
        });
        
        function togglePlayPause() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }
        
        function seek(e) {
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // ===== СОЗДАНИЕ ЭЛЕМЕНТА ТРЕКА =====
        function createTrackElement(track) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                </div>
                <div class="track-duration">${formatTime(track.duration)}</div>
            `;
            div.onclick = () => {
                addToQueue(track);
                if (queue.length === 1) {
                    playTrack(track);
                } else {
                    tg.showPopup({title: 'Добавлено', message: 'Трек добавлен в очередь', buttons: [{type: 'ok'}]});
                }
            };
            return div;
        }
        
        // ===== ПОИСК =====
        async function searchTracks(query) {
            const searchResults = document.getElementById('searchResults');
            searchResults.innerHTML = '<div class="loading">Поиск...</div>';
            
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (!tracks || tracks.length === 0) {
                    searchResults.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                    return;
                }
                
                searchResults.innerHTML = '';
                tracks.forEach(track => {
                    searchResults.appendChild(createTrackElement({
                        ...track,
                        track_id: track.id
                    }));
                });
            } catch (e) {
                console.error(e);
                searchResults.innerHTML = '<div class="empty-state">Ошибка поиска</div>';
            }
        }
        
        // ===== TAB ПЕРЕКЛЮЧЕНИЕ =====
        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            
            document.getElementById('search-tab').classList.add('hidden');
            document.getElementById('library-tab').classList.add('hidden');
            document.getElementById('playlists-tab').classList.add('hidden');
            document.getElementById('profile-tab').classList.add('hidden');
            
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
            
            if (tabId === 'library') loadLikes();
            if (tabId === 'playlists') loadPlaylists();
        }
        
        // ===== MODAL =====
        function closePlaylistModal() {
            document.getElementById('playlistModal').classList.remove('active');
            document.getElementById('playlistName').value = '';
        }
        
        function closeAddToPlaylistModal() {
            document.getElementById('addToPlaylistModal').classList.remove('active');
            currentTrackForPlaylist = null;
        }
        
        function toggleQueue() {
            document.getElementById('queue').classList.toggle('active');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ===== EVENT LISTENERS =====
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });
        
        document.getElementById('createPlaylistBtn').onclick = () => {
            document.getElementById('playlistModal').classList.add('active');
        };
        
        document.getElementById('playPauseBtn').onclick = togglePlayPause;
        document.getElementById('prevBtn').onclick = playPrev;
        document.getElementById('nextBtn').onclick = playNext;
        document.getElementById('likeBtn').onclick = toggleLike;
        document.getElementById('playlistAddBtn').onclick = addCurrentToPlaylist;
        document.getElementById('progressBar').onclick = seek;
        document.getElementById('closeQueueBtn').onclick = () => document.getElementById('queue').classList.remove('active');
        
        let searchTimeout;
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length >= 2) {
                searchTimeout = setTimeout(() => searchTracks(query), 500);
            }
        });
        
        // ===== ЗАПУСК =====
        initProfile();
        switchTab('search');
    </script>
</body>
</html>
