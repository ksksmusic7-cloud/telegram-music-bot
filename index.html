<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#007aff">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 0;
            margin: 0;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--tg-theme-hint-color, #e0e0e0);
            display: flex;
            padding: 8px 20px 12px 20px;
            z-index: 100;
        }
        
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .tab.active {
            color: var(--tg-theme-button-color, #007aff);
        }
        
        .tab-icon {
            font-size: 22px;
        }
        
        /* Main Content */
        .main-content {
            padding: 20px 16px 80px 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        
        .header p {
            font-size: 15px;
            opacity: 0.7;
        }
        
        /* Search */
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            color: var(--tg-theme-text-color, #000000);
            margin-bottom: 20px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #007aff);
        }
        
        /* Track List */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        
        .track-item:active {
            transform: scale(0.98);
        }
        
        .track-cover {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .track-info {
            flex: 1;
            min-width: 0;
        }
        
        .track-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-artist {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .like-btn, .share-btn, .playlist-add-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            transition: transform 0.1s ease;
        }
        
        .like-btn:active, .share-btn:active, .playlist-add-btn:active {
            transform: scale(0.9);
        }
        
        .track-duration {
            font-size: 13px;
            opacity: 0.5;
            min-width: 40px;
            text-align: right;
        }
        
        /* Playlist Card */
        .playlist-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        
        .playlist-card:active {
            transform: scale(0.98);
        }
        
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .playlist-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .playlist-stats {
            font-size: 12px;
            opacity: 0.5;
        }
        
        .playlist-description {
            font-size: 13px;
            opacity: 0.7;
        }
        
        .create-playlist-btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #007aff);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
        }
        
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-buttons button:first-child {
            background: var(--tg-theme-button-color, #007aff);
            color: white;
        }
        
        .profile-section {
            text-align: center;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .profile-username {
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 24px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 20px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .install-pwa {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-top: 20px;
        }
        
        .install-pwa button {
            background: var(--tg-theme-button-color, #007aff);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }
        
        .player {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--tg-theme-hint-color, #e0e0e0);
            padding: 12px 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }
        
        .player.active {
            transform: translateY(0);
        }
        
        .player-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        audio {
            width: 100%;
            border-radius: 12px;
        }
        
        .hidden {
            display: none;
        }
        
        /* PWA Install Prompt */
        .pwa-install-prompt {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: var(--tg-theme-button-color, #007aff);
            color: white;
            padding: 12px 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 101;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }
        
        .pwa-install-prompt.show {
            transform: translateY(0);
        }
        
        .pwa-install-prompt button {
            background: white;
            color: var(--tg-theme-button-color, #007aff);
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab" data-tab="search">
            <div class="tab-icon">🔍</div>
            <span>Поиск</span>
        </button>
        <button class="tab" data-tab="library">
            <div class="tab-icon">❤️</div>
            <span>Любимое</span>
        </button>
        <button class="tab" data-tab="playlists">
            <div class="tab-icon">📀</div>
            <span>Плейлисты</span>
        </button>
        <button class="tab" data-tab="profile">
            <div class="tab-icon">👤</div>
            <span>Профиль</span>
        </button>
    </div>
    
    <div class="main-content">
        <!-- Поиск -->
        <div id="search-tab">
            <div class="header">
                <h1>Music Bot</h1>
                <p>Найди и слушай любую музыку</p>
            </div>
            <input type="text" class="search-box" id="searchInput" placeholder="Поиск песен, исполнителей..." autofocus>
            <div class="track-list" id="searchResults"></div>
        </div>
        
        <!-- Библиотека (лайки) -->
        <div id="library-tab" class="hidden">
            <div class="header">
                <h1>Любимое</h1>
                <p>Треки, которые тебе понравились</p>
            </div>
            <div class="track-list" id="libraryList"></div>
        </div>
        
        <!-- Плейлисты -->
        <div id="playlists-tab" class="hidden">
            <div class="header">
                <h1>Плейлисты</h1>
                <p>Создавай и делись подборками</p>
            </div>
            <button class="create-playlist-btn" id="createPlaylistBtn">+ Новый плейлист</button>
            <div id="playlistsList"></div>
        </div>
        
        <!-- Профиль -->
        <div id="profile-tab" class="hidden">
            <div class="profile-section">
                <div class="avatar" id="avatar">🎵</div>
                <div class="profile-name" id="displayName"></div>
                <div class="profile-username" id="username"></div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="likesCount">0</div>
                        <div class="stat-label">Лайков</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="playlistsCount">0</div>
                        <div class="stat-label">Плейлистов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="listenedCount">0</div>
                        <div class="stat-label">Прослушано</div>
                    </div>
                </div>
                
                <div class="install-pwa" id="pwaInstall" style="display: none;">
                    <div>📱 Установи приложение</div>
                    <button id="installPwaBtn">Установить на рабочий стол</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="player" id="player">
        <div class="player-title" id="playerTitle"></div>
        <audio id="audio" controls preload="none"></audio>
    </div>
    
    <!-- Модальное окно для создания плейлиста -->
    <div class="modal" id="playlistModal">
        <div class="modal-content">
            <h3>Новый плейлист</h3>
            <input type="text" id="playlistName" placeholder="Название плейлиста">
            <textarea id="playlistDesc" placeholder="Описание (необязательно)" rows="3"></textarea>
            <div class="modal-buttons">
                <button onclick="createPlaylist()">Создать</button>
                <button onclick="closePlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно добавления в плейлист -->
    <div class="modal" id="addToPlaylistModal">
        <div class="modal-content">
            <h3>Добавить в плейлист</h3>
            <div id="playlistSelect"></div>
            <div class="modal-buttons">
                <button onclick="addCurrentTrackToPlaylist()">Добавить</button>
                <button onclick="closeAddToPlaylistModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <div class="pwa-install-prompt" id="pwaPrompt">
        <span>📱 Установи приложение</span>
        <button id="pwaInstallBtn">Установить</button>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const telegramId = tg.initDataUnsafe?.user?.id;
        const telegramUsername = tg.initDataUnsafe?.user?.username || '';
        const telegramFirstName = tg.initDataUnsafe?.user?.first_name || '';
        
        let currentTab = 'search';
        let currentAudio = null;
        let currentUrl = null;
        let likedTracks = new Map();
        let userPlaylists = [];
        let currentTrackForPlaylist = null;
        let deferredPrompt = null;
        
        // ===== PWA УСТАНОВКА =====
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaPrompt').classList.add('show');
            document.getElementById('pwaInstall').style.display = 'block';
        });
        
        document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('pwaPrompt').classList.remove('show');
            }
        });
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        async function initProfile() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/profile/${telegramId}`);
            const profile = await response.json();
            
            if (!profile.exists) {
                await fetch(`/api/profile/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: telegramUsername,
                        display_name: telegramFirstName,
                        avatar_url: ''
                    })
                });
            }
            
            document.getElementById('displayName').textContent = profile.display_name || telegramFirstName;
            document.getElementById('username').textContent = `@${telegramUsername || 'user'}`;
            
            if (profile.stats) {
                document.getElementById('likesCount').textContent = profile.stats.likes;
                document.getElementById('playlistsCount').textContent = profile.stats.playlists;
                document.getElementById('listenedCount').textContent = profile.stats.listened;
            }
            
            await loadLikes();
            await loadPlaylists();
        }
        
        // ===== ЛАЙКИ =====
        async function loadLikes() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/likes/${telegramId}`);
            const likes = await response.json();
            
            likedTracks.clear();
            likes.forEach(like => {
                likedTracks.set(like.track_id, like);
            });
            
            document.getElementById('likesCount').textContent = likes.length;
            
            const libraryList = document.getElementById('libraryList');
            if (likes.length === 0) {
                libraryList.innerHTML = '<div class="empty-state">Нет сохранённых треков<br>❤️ Лайкайте музыку, чтобы она появилась здесь</div>';
            } else {
                libraryList.innerHTML = '';
                likes.forEach(like => {
                    libraryList.appendChild(createTrackElement(like, true));
                });
            }
        }
        
        // ===== ПЛЕЙЛИСТЫ =====
        async function loadPlaylists() {
            if (!telegramId) return;
            
            const response = await fetch(`/api/playlists/${telegramId}`);
            userPlaylists = await response.json();
            
            document.getElementById('playlistsCount').textContent = userPlaylists.length;
            
            const playlistsList = document.getElementById('playlistsList');
            if (userPlaylists.length === 0) {
                playlistsList.innerHTML = '<div class="empty-state">У вас пока нет плейлистов<br>Создайте первый!</div>';
            } else {
                playlistsList.innerHTML = '';
                userPlaylists.forEach(playlist => {
                    const div = document.createElement('div');
                    div.className = 'playlist-card';
                    div.onclick = () => openPlaylist(playlist);
                    div.innerHTML = `
                        <div class="playlist-header">
                            <span class="playlist-name">${escapeHtml(playlist.name)}</span>
                            <span class="playlist-stats">${playlist.is_public ? '🌍 Публичный' : '🔒 Приватный'}</span>
                        </div>
                        <div class="playlist-description">${escapeHtml(playlist.description || 'Без описания')}</div>
                    `;
                    playlistsList.appendChild(div);
                });
            }
        }
        
        async function openPlaylist(playlist) {
            const response = await fetch(`/api/playlists/${playlist.id}/tracks`);
            const tracks = await response.json();
            
            if (tracks.length === 0) {
                tg.showPopup({
                    title: playlist.name,
                    message: 'В плейлисте пока нет треков',
                    buttons: [{type: 'ok'}]
                });
            } else {
                let message = `📀 ${playlist.name}\n\n`;
                tracks.forEach((track, i) => {
                    message += `${i+1}. ${track.title} — ${track.artist}\n`;
                });
                tg.showPopup({
                    title: playlist.name,
                    message: message.slice(0, 200),
                    buttons: [{type: 'ok'}]
                });
            }
        }
        
        function createPlaylist() {
            const name = document.getElementById('playlistName').value.trim();
            const description = document.getElementById('playlistDesc').value.trim();
            
            if (!name) {
                tg.showPopup({title: 'Ошибка', message: 'Введите название плейлиста', buttons: [{type: 'ok'}]});
                return;
            }
            
            fetch(`/api/playlists/${telegramId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description, is_public: false })
            }).then(() => {
                closePlaylistModal();
                loadPlaylists();
                tg.showPopup({title: 'Успех', message: 'Плейлист создан', buttons: [{type: 'ok'}]});
            });
        }
        
        async function addToPlaylist(track) {
            currentTrackForPlaylist = track;
            const selectDiv = document.getElementById('playlistSelect');
            
            if (userPlaylists.length === 0) {
                tg.showPopup({
                    title: 'Нет плейлистов',
                    message: 'Сначала создайте плейлист',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            selectDiv.innerHTML = userPlaylists.map(playlist => `
                <button onclick="addTrackToPlaylist(${playlist.id})" style="width:100%; padding:12px; margin-bottom:8px; background:var(--tg-theme-secondary-bg-color); border:none; border-radius:12px; text-align:left; cursor:pointer;">
                    <strong>${escapeHtml(playlist.name)}</strong><br>
                    <small>${playlist.is_public ? 'Публичный' : 'Приватный'}</small>
                </button>
            `).join('');
            
            document.getElementById('addToPlaylistModal').classList.add('active');
        }
        
        async function addTrackToPlaylist(playlistId) {
            await fetch(`/api/playlists/${playlistId}/tracks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    track_id: currentTrackForPlaylist.id || currentTrackForPlaylist.track_id,
                    title: currentTrackForPlaylist.title,
                    artist: currentTrackForPlaylist.artist,
                    url: currentTrackForPlaylist.url,
                    thumbnail: currentTrackForPlaylist.thumbnail
                })
            });
            closeAddToPlaylistModal();
            tg.showPopup({title: 'Успех', message: 'Трек добавлен в плейлист', buttons: [{type: 'ok'}]});
        }
        
        async function sharePlaylist(playlistId) {
            const response = await fetch(`/api/playlists/${playlistId}/share`, { method: 'POST' });
            const data = await response.json();
            
            tg.showPopup({
                title: 'Поделиться',
                message: `Ссылка на плейлист: ${data.share_url}`,
                buttons: [{type: 'ok'}]
            });
        }
        
        // ===== СОЗДАНИЕ ЭЛЕМЕНТА ТРЕКА =====
        function createTrackElement(track, isLiked = false) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <div class="track-cover">🎵</div>
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                </div>
                <div class="track-actions">
                    <button class="like-btn" data-id="${track.track_id || track.id}" data-liked="${isLiked}">
                        ${isLiked ? '❤️' : '🤍'}
                    </button>
                    <button class="playlist-add-btn" data-id="${track.track_id || track.id}">📀</button>
                    <button class="share-btn" data-url="${track.url}">📤</button>
                    <div class="track-duration">${formatDuration(track.duration)}</div>
                </div>
            `;
            
            div.onclick = (e) => {
                if (e.target.classList.contains('like-btn') || 
                    e.target.classList.contains('share-btn') || 
                    e.target.classList.contains('playlist-add-btn')) return;
                playTrack(track.url, track.title, track.track_id || track.id, track.artist);
            };
            
            const likeBtn = div.querySelector('.like-btn');
            likeBtn.onclick = async (e) => {
                e.stopPropagation();
                const trackId = likeBtn.dataset.id;
                const isCurrentlyLiked = likeBtn.dataset.liked === 'true';
                
                if (isCurrentlyLiked) {
                    await fetch(`/api/likes/${telegramId}?track_id=${trackId}`, { method: 'DELETE' });
                    likeBtn.innerHTML = '🤍';
                    likeBtn.dataset.liked = 'false';
                } else {
                    await fetch(`/api/likes/${telegramId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            track_id: trackId,
                            title: track.title,
                            artist: track.artist,
                            url: track.url,
                            thumbnail: track.thumbnail
                        })
                    });
                    likeBtn.innerHTML = '❤️';
                    likeBtn.dataset.liked = 'true';
                }
                await loadLikes();
                if (currentTab === 'search') refreshSearchResults();
            };
            
            const shareBtn = div.querySelector('.share-btn');
            shareBtn.onclick = (e) => {
                e.stopPropagation();
                tg.sendData(JSON.stringify({ action: 'share', url: track.url }));
                tg.showPopup({title: 'Поделиться', message: 'Трек отправлен в чат!', buttons: [{type: 'ok'}]});
            };
            
            const playlistBtn = div.querySelector('.playlist-add-btn');
            playlistBtn.onclick = (e) => {
                e.stopPropagation();
                addToPlaylist(track);
            };
            
            return div;
        }
        
        // ===== ПОИСК =====
        async function searchTracks(query) {
            const searchResults = document.getElementById('searchResults');
            searchResults.innerHTML = '<div class="loading">Поиск...</div>';
            
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                
                if (!tracks || tracks.length === 0) {
                    searchResults.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                    return;
                }
                
                searchResults.innerHTML = '';
                tracks.forEach(track => {
                    const isLiked = likedTracks.has(track.id);
                    searchResults.appendChild(createTrackElement({
                        ...track,
                        track_id: track.id
                    }, isLiked));
                });
            } catch (e) {
                console.error(e);
                searchResults.innerHTML = '<div class="empty-state">Ошибка поиска</div>';
            }
        }
        
        async function refreshSearchResults() {
            const query = document.getElementById('searchInput').value;
            if (query.length >= 2) {
                await searchTracks(query);
            }
        }
        
        // ===== ПЛЕЕР =====
        async function playTrack(url, title, trackId, artist) {
            const player = document.getElementById('player');
            const audio = document.getElementById('audio');
            const playerTitle = document.getElementById('playerTitle');
            
            if (currentUrl === url && !audio.paused) return;
            
            playerTitle.textContent = title;
            player.classList.add('active');
            currentUrl = url;
            
            // Сохраняем в историю
            if (telegramId && trackId) {
                await fetch(`/api/history/${telegramId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ track_id: trackId, title: title, artist: artist })
                });
            }
            
            try {
                const response = await fetch(`/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                } else {
                    playerTitle.textContent = 'Ошибка загрузки';
                }
            } catch (e) {
                playerTitle.textContent = 'Ошибка загрузки';
            }
        }
        
        function formatDuration(seconds) {
            if (!seconds || seconds === 0) return '?';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ===== TAB ПЕРЕКЛЮЧЕНИЕ =====
        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            
            document.getElementById('search-tab').classList.add('hidden');
            document.getElementById('library-tab').classList.add('hidden');
            document.getElementById('playlists-tab').classList.add('hidden');
            document.getElementById('profile-tab').classList.add('hidden');
            
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
            
            if (tabId === 'library') loadLikes();
            if (tabId === 'playlists') loadPlaylists();
        }
        
        // ===== MODAL =====
        function closePlaylistModal() {
            document.getElementById('playlistModal').classList.remove('active');
            document.getElementById('playlistName').value = '';
            document.getElementById('playlistDesc').value = '';
        }
        
        function closeAddToPlaylistModal() {
            document.getElementById('addToPlaylistModal').classList.remove('active');
            currentTrackForPlaylist = null;
        }
        
        // ===== EVENT LISTENERS =====
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });
        
        document.getElementById('createPlaylistBtn').onclick = () => {
            document.getElementById('playlistModal').classList.add('active');
        };
        
        let searchTimeout;
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length >= 2) {
                searchTimeout = setTimeout(() => searchTracks(query), 500);
            }
        });
        
        // ===== ЗАПУСК =====
        initProfile();
        switchTab('search');
    </script>
</body>
</html>
