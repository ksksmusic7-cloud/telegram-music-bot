<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            padding: 0;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            padding: 8px 20px 12px 20px;
            z-index: 100;
        }
        
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .tab.active { color: #1ed760; }
        .tab-icon { font-size: 22px; }
        
        /* Main Content - virtual scroll container */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 80px;
            overflow-y: auto;
            padding: 20px 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        
        .header { margin-bottom: 24px; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
        .header p { font-size: 15px; opacity: 0.7; }
        
        /* Search */
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            margin-bottom: 20px;
        }
        .search-box:focus { outline: none; background: rgba(255, 255, 255, 0.15); }
        .search-box::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        /* Virtual scroll container */
        .virtual-scroll {
            position: relative;
            min-height: 200px;
        }
        
        .track-list {
            position: relative;
        }
        
        .track-item {
            position: absolute;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
            will-change: transform;
        }
        
        .track-item:active { background: rgba(255, 255, 255, 0.1); }
        
        .track-cover {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-weight: 500; margin-bottom: 4px; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 13px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-duration { font-size: 13px; opacity: 0.5; flex-shrink: 0; }
        
        /* Mini Player */
        .mini-player {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            z-index: 101;
            transform: translateY(0);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .mini-player.hidden { transform: translateY(100%); }
        
        .mini-player-content { display: flex; align-items: center; gap: 12px; }
        .mini-player-cover { width: 48px; height: 48px; border-radius: 8px; flex-shrink: 0; }
        .mini-player-info { flex: 1; min-width: 0; }
        .mini-player-title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-player-artist { font-size: 12px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-player-controls { display: flex; align-items: center; gap: 16px; }
        .mini-player-btn {
            background: none; border: none; color: white; font-size: 20px;
            cursor: pointer; width: 36px; height: 36px; display: flex;
            align-items: center; justify-content: center; border-radius: 50%;
        }
        .mini-player-btn:active { background: rgba(255, 255, 255, 0.1); }
        .mini-player-btn.play { font-size: 28px; }
        
        /* Expanded Player */
        .expanded-player {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #000000; z-index: 200; transform: translateY(100%);
            transition: transform 0.3s ease; display: flex; flex-direction: column;
            overflow-y: auto;
        }
        .expanded-player.active { transform: translateY(0); }
        
        .expanded-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
        }
        .expanded-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .expanded-close:active { background: rgba(255, 255, 255, 0.1); }
        
        .expanded-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .expanded-cover { width: 280px; height: 280px; border-radius: 16px; margin-bottom: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .expanded-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .expanded-artist { font-size: 16px; opacity: 0.7; text-align: center; margin-bottom: 32px; }
        
        .expanded-controls { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 24px; }
        .expanded-control-btn {
            background: none; border: none; color: white; font-size: 28px;
            cursor: pointer; width: 56px; height: 56px; border-radius: 50%;
        }
        .expanded-control-btn:active { transform: scale(0.95); }
        .expanded-control-btn.play { background: #1ed760; color: black; font-size: 32px; width: 64px; height: 64px; }
        
        .progress-bar { width: 100%; max-width: 400px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; margin-bottom: 8px; }
        .progress-fill { width: 0%; height: 100%; background: #1ed760; border-radius: 2px; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.5; width: 100%; max-width: 400px; }
        
        .expanded-actions { display: flex; justify-content: center; gap: 30px; margin-top: 24px; }
        .expanded-actions button { background: rgba(255, 255, 255, 0.1); border: none; padding: 10px 24px; border-radius: 30px; color: white; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .queue-section { width: 100%; max-width: 500px; margin-top: 24px; padding: 16px; background: rgba(255, 255, 255, 0.05); border-radius: 16px; }
        .queue-title { font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .queue-list { max-height: 300px; overflow-y: auto; }
        .queue-item {
            padding: 10px 0; display: flex; align-items: center; gap: 12px;
            cursor: grab; border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }
        .queue-item:active { cursor: grabbing; }
        .queue-item.dragging { opacity: 0.3; cursor: grabbing; }
        .queue-item.active { color: #1ed760; }
        .queue-drag-handle { cursor: grab; opacity: 0.5; font-size: 18px; }
        
        .empty-state { text-align: center; padding: 60px 20px; opacity: 0.5; }
        .loading { text-align: center; padding: 40px 20px; opacity: 0.7; }
        .hidden { display: none; }
        
        /* Context Menu */
        .context-menu {
            position: fixed;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 8px 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            min-width: 160px;
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.1s ease, opacity 0.1s ease;
            pointer-events: none;
        }
        .context-menu.active {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        .context-menu-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.1s ease;
        }
        .context-menu-item:active { background: rgba(255,255,255,0.1); }
        
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8); display: flex; align-items: center;
            justify-content: center; z-index: 300; visibility: hidden; opacity: 0;
            transition: all 0.3s ease;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { background: #121212; border-radius: 20px; padding: 24px; width: 90%; max-width: 320px; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(255,255,255,0.1); color: white; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
        .modal-buttons button:first-child { background: #1ed760; color: black; }
        .modal-buttons button:last-child { background: rgba(255, 255, 255, 0.1); color: white; }
        
        .profile-section { text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; background: linear-gradient(135deg, #1db954 0%, #191414 100%); }
        .profile-name { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .profile-username { font-size: 15px; opacity: 0.7; margin-bottom: 24px; }
        .stats-row { display: flex; justify-content: space-around; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 24px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-label { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .create-playlist-btn { width: 100%; padding: 14px; background: #1ed760; color: black; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; margin-bottom: 20px; cursor: pointer; }
        .playlist-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
        .playlist-card:active { background: rgba(255,255,255,0.1); }
        .playlist-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        
        .toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 8px 16px; border-radius: 30px; font-size: 14px; z-index: 150; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab" data-tab="search"><div class="tab-icon">🔍</div><span>Поиск</span></button>
        <button class="tab" data-tab="library"><div class="tab-icon">❤️</div><span>Любимое</span></button>
        <button class="tab" data-tab="playlists"><div class="tab-icon">📀</div><span>Плейлисты</span></button>
        <button class="tab" data-tab="profile"><div class="tab-icon">👤</div><span>Профиль</span></button>
    </div>
    
    <div class="main-content" id="mainContent">
        <div id="search-tab"><div class="header"><h1>Поиск</h1><p>Найди и слушай любую музыку</p></div><input type="text" class="search-box" id="searchInput" placeholder="Что хочешь послушать?" autofocus><div id="searchResults" class="track-list"></div></div>
        <div id="library-tab" class="hidden"><div class="header"><h1>Любимое</h1><p>Треки, которые тебе понравились</p></div><div id="libraryList" class="track-list"></div></div>
        <div id="playlists-tab" class="hidden"><div class="header"><h1>Плейлисты</h1><p>Создавай подборки</p></div><button class="create-playlist-btn" id="createPlaylistBtn">+ Новый плейлист</button><div id="playlistsList"></div></div>
        <div id="profile-tab" class="hidden"><div class="profile-section"><div class="avatar" id="avatar">🎵</div><div class="profile-name" id="displayName"></div><div class="profile-username" id="username"></div><div class="stats-row"><div class="stat-item"><div class="stat-value" id="likesCount">0</div><div class="stat-label">Лайков</div></div><div class="stat-item"><div class="stat-value" id="playlistsCount">0</div><div class="stat-label">Плейлистов</div></div></div></div></div>
    </div>
    
    <div class="mini-player hidden" id="miniPlayer"><div class="mini-player-content"><div class="mini-player-cover" id="miniCover">🎵</div><div class="mini-player-info"><div class="mini-player-title" id="miniTitle">Выберите трек</div><div class="mini-player-artist" id="miniArtist"></div></div><div class="mini-player-controls"><button class="mini-player-btn" id="miniPrevBtn">⏮️</button><button class="mini-player-btn play" id="miniPlayPauseBtn">▶️</button><button class="mini-player-btn" id="miniNextBtn">⏭️</button></div></div></div>
    
    <div class="expanded-player" id="expandedPlayer"><div class="expanded-header"><button class="expanded-close" id="closeExpandedBtn">↓</button><div></div><button class="expanded-close" id="closeExpandedBtn2">✕</button></div><div class="expanded-content"><div class="expanded-cover" id="expandedCover">🎵</div><div class="expanded-title" id="expandedTitle">Выберите трек</div><div class="expanded-artist" id="expandedArtist"></div><div class="progress-bar" id="expandedProgressBar"><div class="progress-fill" id="expandedProgressFill"></div></div><div class="time-info"><span id="expandedCurrentTime">0:00</span><span id="expandedTotalTime">0:00</span></div><div class="expanded-controls"><button class="expanded-control-btn" id="expandedPrevBtn">⏮️</button><button class="expanded-control-btn play" id="expandedPlayPauseBtn">▶️</button><button class="expanded-control-btn" id="expandedNextBtn">⏭️</button></div><div class="expanded-actions"><button id="expandedLikeBtn">🤍 Лайк</button><button id="expandedPlaylistBtn">📀 В плейлист</button></div><div class="queue-section"><div class="queue-title"><span>Очередь</span><span id="queueCount">0 треков</span></div><div class="queue-list" id="expandedQueueList"></div></div></div></div>
    
    <div class="context-menu" id="contextMenu"><div class="context-menu-item" data-action="play">▶️ Воспроизвести</div><div class="context-menu-item" data-action="queue">📋 В очередь</div><div class="context-menu-item" data-action="like">❤️ Лайк</div><div class="context-menu-item" data-action="playlist">📀 В плейлист</div></div>
    <div class="toast" id="toast"></div>
    
    <div class="modal" id="playlistModal"><div class="modal-content"><h3>Новый плейлист</h3><input type="text" id="playlistName" placeholder="Название плейлиста"><div class="modal-buttons"><button onclick="window.createPlaylist()">Создать</button><button onclick="window.closePlaylistModal()">Отмена</button></div></div></div>
    <div class="modal" id="addToPlaylistModal"><div class="modal-content"><h3>Добавить в плейлист</h3><div id="playlistSelect"></div><div class="modal-buttons"><button onclick="window.closeAddToPlaylistModal()">Отмена</button></div></div></div>
    
    <script>
        // ==================== ОПТИМИЗИРОВАННЫЙ КОД ====================
        (function(){
            // DOM элементы
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            // Конфиг
            const CONFIG = {
                TELEGRAM_ID: tg.initDataUnsafe?.user?.id,
                USERNAME: tg.initDataUnsafe?.user?.username || '',
                FIRST_NAME: tg.initDataUnsafe?.user?.first_name || '',
                API_BASE: '',
                CACHE_TTL: 300000, // 5 минут
            };
            
            // Состояние
            let state = {
                currentTab: 'search',
                currentTrack: null,
                queue: [],
                queueIndex: 0,
                likedTracks: new Map(),
                playlists: [],
                searchCache: new Map(),
                pendingRequests: new Map()
            };
            
            // Аудио
            const audio = new Audio();
            let isPlaying = false;
            
            // Глобальные функции для модалок
            window.createPlaylist = () => createPlaylist();
            window.closePlaylistModal = () => closePlaylistModal();
            window.closeAddToPlaylistModal = () => closeAddToPlaylistModal();
            window.addTrackToPlaylist = (id) => addTrackToPlaylist(id);
            
            // ========== УТИЛИТЫ ==========
            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }
            
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function formatTime(sec) {
                if (isNaN(sec)) return '0:00';
                const mins = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return `${mins}:${s.toString().padStart(2, '0')}`;
            }
            
            function getGradient(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
                const hue1 = Math.abs(hash % 360);
                const hue2 = (hue1 + 40) % 360;
                return `linear-gradient(135deg, hsl(${hue1}, 70%, 50%) 0%, hsl(${hue2}, 70%, 40%) 100%)`;
            }
            
            // ========== API ЗАПРОСЫ С КЭШИРОВАНИЕМ ==========
            async function fetchAPI(endpoint, options = {}) {
                const cacheKey = `${endpoint}_${JSON.stringify(options)}`;
                if (options.method !== 'POST' && state.searchCache.has(cacheKey)) {
                    const cached = state.searchCache.get(cacheKey);
                    if (Date.now() - cached.time < CONFIG.CACHE_TTL) return cached.data;
                }
                
                if (state.pendingRequests.has(cacheKey)) return state.pendingRequests.get(cacheKey);
                
                const promise = fetch(endpoint, options).then(r => r.json());
                state.pendingRequests.set(cacheKey, promise);
                const data = await promise;
                state.pendingRequests.delete(cacheKey);
                
                if (options.method !== 'POST') state.searchCache.set(cacheKey, { data, time: Date.now() });
                return data;
            }
            
            // ========== ПРОФИЛЬ ==========
            async function initProfile() {
                if (!CONFIG.TELEGRAM_ID) return;
                const profile = await fetchAPI(`/api/profile/${CONFIG.TELEGRAM_ID}`);
                if (!profile.exists) {
                    await fetchAPI(`/api/profile/${CONFIG.TELEGRAM_ID}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: CONFIG.USERNAME, display_name: CONFIG.FIRST_NAME })
                    });
                }
                document.getElementById('displayName').textContent = profile.display_name || CONFIG.FIRST_NAME;
                document.getElementById('username').textContent = `@${CONFIG.USERNAME || 'user'}`;
                if (profile.stats) {
                    document.getElementById('likesCount').textContent = profile.stats.likes;
                    document.getElementById('playlistsCount').textContent = profile.stats.playlists;
                }
                await loadLikes();
                await loadPlaylists();
            }
            
            // ========== ЛАЙКИ ==========
            async function loadLikes() {
                if (!CONFIG.TELEGRAM_ID) return;
                const likes = await fetchAPI(`/api/likes/${CONFIG.TELEGRAM_ID}`);
                state.likedTracks.clear();
                likes.forEach(l => state.likedTracks.set(l.track_id, l));
                document.getElementById('likesCount').textContent = likes.length;
                updateLikeButton();
                
                const container = document.getElementById('libraryList');
                if (!likes.length) { container.innerHTML = '<div class="empty-state">Нет сохранённых треков</div>'; return; }
                container.innerHTML = '';
                likes.forEach(like => container.appendChild(createTrackElement(like)));
            }
            
            async function toggleLike() {
                if (!state.currentTrack) return;
                const isLiked = state.likedTracks.has(state.currentTrack.track_id);
                if (isLiked) {
                    await fetchAPI(`/api/likes/${CONFIG.TELEGRAM_ID}?track_id=${state.currentTrack.track_id}`, { method: 'DELETE' });
                    state.likedTracks.delete(state.currentTrack.track_id);
                    showToast('Удалено из любимых');
                } else {
                    await fetchAPI(`/api/likes/${CONFIG.TELEGRAM_ID}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ track_id: state.currentTrack.track_id, title: state.currentTrack.title, artist: state.currentTrack.artist, url: state.currentTrack.url })
                    });
                    state.likedTracks.set(state.currentTrack.track_id, state.currentTrack);
                    showToast('Добавлено в любимое');
                }
                updateLikeButton();
                document.getElementById('likesCount').textContent = state.likedTracks.size;
                loadLikes();
            }
            
            function updateLikeButton() {
                const btn = document.getElementById('expandedLikeBtn');
                if (state.currentTrack && state.likedTracks.has(state.currentTrack.track_id)) {
                    btn.innerHTML = '❤️ В любимых';
                    btn.style.opacity = '1';
                } else {
                    btn.innerHTML = '🤍 Лайк';
                    btn.style.opacity = '0.7';
                }
            }
            
            // ========== ПЛЕЙЛИСТЫ ==========
            async function loadPlaylists() {
                if (!CONFIG.TELEGRAM_ID) return;
                const playlists = await fetchAPI(`/api/playlists/${CONFIG.TELEGRAM_ID}`);
                state.playlists = playlists;
                document.getElementById('playlistsCount').textContent = playlists.length;
                const container = document.getElementById('playlistsList');
                if (!playlists.length) { container.innerHTML = '<div class="empty-state">Нет плейлистов</div>'; return; }
                container.innerHTML = '';
                playlists.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'playlist-card';
                    div.innerHTML = `<div class="playlist-name">${escapeHtml(p.name)}</div><div style="font-size:12px;opacity:0.5">${new Date(p.created_at).toLocaleDateString()}</div>`;
                    div.onclick = () => openPlaylist(p);
                    container.appendChild(div);
                });
            }
            
            async function openPlaylist(playlist) {
                const tracks = await fetchAPI(`/api/playlists/${playlist.id}/tracks`);
                if (!tracks.length) { showToast('Плейлист пуст'); return; }
                setQueue(tracks);
                playTrack(tracks[0]);
            }
            
            function createPlaylist() {
                const name = document.getElementById('playlistName').value.trim();
                if (!name) { showToast('Введите название'); return; }
                fetchAPI(`/api/playlists/${CONFIG.TELEGRAM_ID}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) })
                    .then(() => { closePlaylistModal(); loadPlaylists(); showToast('Плейлист создан'); });
            }
            
            async function addCurrentToPlaylist() {
                if (!state.currentTrack) return;
                if (!state.playlists.length) { showToast('Создайте плейлист'); return; }
                const container = document.getElementById('playlistSelect');
                container.innerHTML = state.playlists.map(p => `<button onclick="window.addTrackToPlaylist(${p.id})" style="width:100%;padding:12px;margin-bottom:8px;background:rgba(255,255,255,0.1);border:none;border-radius:12px;color:white;cursor:pointer;"><strong>${escapeHtml(p.name)}</strong></button>`).join('');
                document.getElementById('addToPlaylistModal').classList.add('active');
            }
            
            async function addTrackToPlaylist(playlistId) {
                await fetchAPI(`/api/playlists/${playlistId}/tracks`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ track_id: state.currentTrack.track_id, title: state.currentTrack.title, artist: state.currentTrack.artist, url: state.currentTrack.url })
                });
                closeAddToPlaylistModal();
                showToast('Добавлено в плейлист');
            }
            
            // ========== ОЧЕРЕДЬ И ПЛЕЕР ==========
            function setQueue(tracks) {
                state.queue = tracks.map((t, i) => ({ ...t, track_id: t.track_id || `track_${i}_${Date.now()}` }));
                state.queueIndex = 0;
                renderQueue();
            }
            
            function addToQueue(track) {
                state.queue.push({ ...track, track_id: track.track_id || `track_${Date.now()}_${Math.random()}` });
                renderQueue();
                showToast(`Добавлено в очередь (${state.queue.length})`);
            }
            
            function renderQueue() {
                const container = document.getElementById('expandedQueueList');
                const countSpan = document.getElementById('queueCount');
                countSpan.textContent = `${state.queue.length} треков`;
                if (!state.queue.length) { container.innerHTML = '<div style="text-align:center;padding:20px;opacity:0.5">Очередь пуста</div>'; return; }
                container.innerHTML = '';
                state.queue.forEach((track, idx) => {
                    const div = document.createElement('div');
                    div.className = `queue-item ${idx === state.queueIndex ? 'active' : ''}`;
                    div.draggable = true;
                    div.setAttribute('data-index', idx);
                    div.innerHTML = `<div class="queue-drag-handle">⋮⋮</div><div style="flex:1"><div style="font-weight:500">${escapeHtml(track.title)}</div><div style="font-size:12px;opacity:0.7">${escapeHtml(track.artist)}</div></div>`;
                    div.onclick = (e) => { if (!e.target.classList.contains('queue-drag-handle')) playTrackByIndex(idx); };
                    
                    // Drag and drop
                    div.ondragstart = (e) => { e.dataTransfer.setData('text/plain', idx); div.classList.add('dragging'); };
                    div.ondragend = () => div.classList.remove('dragging');
                    div.ondragover = (e) => e.preventDefault();
                    div.ondrop = (e) => {
                        e.preventDefault();
                        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                        const toIdx = idx;
                        if (fromIdx !== toIdx) {
                            const [moved] = state.queue.splice(fromIdx, 1);
                            state.queue.splice(toIdx, 0, moved);
                            if (state.queueIndex === fromIdx) state.queueIndex = toIdx;
                            else if (state.queueIndex > fromIdx && state.queueIndex <= toIdx) state.queueIndex--;
                            else if (state.queueIndex < fromIdx && state.queueIndex >= toIdx) state.queueIndex++;
                            renderQueue();
                        }
                    };
                    container.appendChild(div);
                });
            }
            
            function playTrackByIndex(idx) {
                if (idx >= 0 && idx < state.queue.length) {
                    state.queueIndex = idx;
                    playTrack(state.queue[idx]);
                }
            }
            
            function updateMiniPlayer() {
                if (state.currentTrack) {
                    document.getElementById('miniTitle').textContent = state.currentTrack.title;
                    document.getElementById('miniArtist').textContent = state.currentTrack.artist;
                    document.getElementById('expandedTitle').textContent = state.currentTrack.title;
                    document.getElementById('expandedArtist').textContent = state.currentTrack.artist;
                    document.getElementById('expandedCover').style.background = getGradient(state.currentTrack.title);
                    document.getElementById('miniCover').style.background = getGradient(state.currentTrack.title);
                    document.getElementById('miniPlayer').classList.remove('hidden');
                } else {
                    document.getElementById('miniPlayer').classList.add('hidden');
                }
            }
            
            async function playTrack(track) {
                state.currentTrack = track;
                updateMiniPlayer();
                updateLikeButton();
                if (CONFIG.TELEGRAM_ID) fetchAPI(`/api/history/${CONFIG.TELEGRAM_ID}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ track_id: track.track_id, title: track.title, artist: track.artist }) });
                const data = await fetchAPI(`/download?url=${encodeURIComponent(track.url)}`);
                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                    isPlaying = true;
                    updatePlayButtons(true);
                } else showToast('Ошибка загрузки');
            }
            
            function playNext() { if (state.queueIndex + 1 < state.queue.length) { state.queueIndex++; playTrack(state.queue[state.queueIndex]); } else showToast('Очередь закончилась'); }
            function playPrev() { if (state.queueIndex - 1 >= 0) { state.queueIndex--; playTrack(state.queue[state.queueIndex]); } }
            function togglePlayPause() { isPlaying ? audio.pause() : audio.play(); }
            function updatePlayButtons(playing) { document.getElementById('miniPlayPauseBtn').textContent = playing ? '⏸️' : '▶️'; document.getElementById('expandedPlayPauseBtn').textContent = playing ? '⏸️' : '▶️'; }
            
            // Аудио события
            audio.ontimeupdate = () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    document.getElementById('expandedProgressFill').style.width = `${percent}%`;
                    document.getElementById('expandedCurrentTime').textContent = formatTime(audio.currentTime);
                    document.getElementById('expandedTotalTime').textContent = formatTime(audio.duration);
                }
            };
            audio.onended = () => playNext();
            audio.onplay = () => { isPlaying = true; updatePlayButtons(true); };
            audio.onpause = () => { isPlaying = false; updatePlayButtons(false); };
            
            function seek(e) { const rect = document.getElementById('expandedProgressBar').getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; if (audio.duration) audio.currentTime = percent * audio.duration; }
            
            // ========== ВИРТУАЛЬНЫЙ СКРОЛЛ ==========
            class VirtualScroll {
                constructor(container, itemHeight, renderFn) {
                    this.container = container;
                    this.itemHeight = itemHeight;
                    this.renderFn = renderFn;
                    this.items = [];
                    this.startIndex = 0;
                    this.endIndex = 0;
                    this.scrollTop = 0;
                    this.container.style.position = 'relative';
                    this.container.style.minHeight = '200px';
                    this.spacer = document.createElement('div');
                    this.spacer.style.position = 'absolute';
                    this.spacer.style.top = '0';
                    this.spacer.style.left = '0';
                    this.spacer.style.right = '0';
                    this.spacer.style.pointerEvents = 'none';
                    this.container.appendChild(this.spacer);
                    this.container.addEventListener('scroll', () => this.onScroll());
                }
                setItems(items) { this.items = items; this.onScroll(); }
                onScroll() {
                    this.scrollTop = this.container.scrollTop;
                    const totalHeight = this.items.length * this.itemHeight;
                    this.spacer.style.height = `${totalHeight}px`;
                    const start = Math.floor(this.scrollTop / this.itemHeight);
                    const end = Math.min(start + Math.ceil(this.container.clientHeight / this.itemHeight) + 2, this.items.length);
                    if (start === this.startIndex && end === this.endIndex) return;
                    this.startIndex = start;
                    this.endIndex = end;
                    this.render();
                }
                render() {
                    const fragment = document.createDocumentFragment();
                    for (let i = this.startIndex; i < this.endIndex; i++) {
                        const item = this.renderFn(this.items[i], i);
                        item.style.position = 'absolute';
                        item.style.top = `${i * this.itemHeight}px`;
                        item.style.left = '0';
                        item.style.right = '0';
                        fragment.appendChild(item);
                    }
                    while (this.container.firstChild && this.container.firstChild !== this.spacer) this.container.removeChild(this.container.firstChild);
                    this.container.appendChild(fragment);
                }
            }
            
            // ========== КОНТЕКСТНОЕ МЕНЮ ==========
            let currentContextTrack = null;
            const contextMenu = document.getElementById('contextMenu');
            function showContextMenu(e, track) {
                e.preventDefault();
                currentContextTrack = track;
                contextMenu.style.left = `${e.clientX}px`;
                contextMenu.style.top = `${e.clientY}px`;
                contextMenu.classList.add('active');
            }
            document.addEventListener('click', () => contextMenu.classList.remove('active'));
            document.querySelectorAll('.context-menu-item').forEach(item => {
                item.onclick = () => {
                    if (!currentContextTrack) return;
                    const action = item.dataset.action;
                    if (action === 'play') { setQueue([currentContextTrack]); playTrack(currentContextTrack); }
                    else if (action === 'queue') addToQueue(currentContextTrack);
                    else if (action === 'like') { state.currentTrack = currentContextTrack; toggleLike(); }
                    else if (action === 'playlist') { state.currentTrack = currentContextTrack; addCurrentToPlaylist(); }
                    contextMenu.classList.remove('active');
                };
            });
            
            // ========== СОЗДАНИЕ ЭЛЕМЕНТА ТРЕКА ==========
            function createTrackElement(track) {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.style.background = 'rgba(255,255,255,0.05)';
                div.innerHTML = `<div class="track-cover" style="background:${getGradient(track.title)}">🎵</div><div class="track-info"><div class="track-title">${escapeHtml(track.title)}</div><div class="track-artist">${escapeHtml(track.artist)}</div></div><div class="track-duration">${formatTime(track.duration)}</div>`;
                div.onclick = () => addToQueue(track);
                
                // Свайп (touch events)
                let touchStart = null;
                div.ontouchstart = (e) => { touchStart = e.touches[0].clientX; };
                div.ontouchend = (e) => {
                    if (!touchStart) return;
                    const diff = e.changedTouches[0].clientX - touchStart;
                    if (diff > 50) addToQueue(track);
                    else if (diff < -50) { state.currentTrack = track; toggleLike(); }
                    touchStart = null;
                };
                
                // Контекстное меню
                div.oncontextmenu = (e) => showContextMenu(e, track);
                return div;
            }
            
            // ========== ПОИСК ==========
            let searchTimeout;
            async function searchTracks(query) {
                const container = document.getElementById('searchResults');
                container.innerHTML = '<div class="loading">Поиск...</div>';
                const tracks = await fetchAPI(`/search?q=${encodeURIComponent(query)}`);
                if (!tracks?.length) { container.innerHTML = '<div class="empty-state">Ничего не найдено</div>'; return; }
                container.innerHTML = '';
                tracks.forEach(t => container.appendChild(createTrackElement({ ...t, track_id: t.id })));
            }
            
            // ========== НАВИГАЦИЯ ==========
            function switchTab(tabId) {
                state.currentTab = tabId;
                document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
                ['search-tab', 'library-tab', 'playlists-tab', 'profile-tab'].forEach(id => document.getElementById(id)?.classList.toggle('hidden', id !== `${tabId}-tab`));
                if (tabId === 'library') loadLikes();
                if (tabId === 'playlists') loadPlaylists();
            }
            
            // ========== MODAL ==========
            function closePlaylistModal() { document.getElementById('playlistModal').classList.remove('active'); document.getElementById('playlistName').value = ''; }
            function closeAddToPlaylistModal() { document.getElementById('addToPlaylistModal').classList.remove('active'); }
            function expandPlayer() { renderQueue(); document.getElementById('expandedPlayer').classList.add('active'); }
            function collapsePlayer() { document.getElementById('expandedPlayer').classList.remove('active'); }
            
            // ========== EVENT LISTENERS ==========
            document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
            document.getElementById('createPlaylistBtn').onclick = () => document.getElementById('playlistModal').classList.add('active');
            document.getElementById('miniPlayPauseBtn').onclick = (e) => { e.stopPropagation(); togglePlayPause(); };
            document.getElementById('miniPrevBtn').onclick = (e) => { e.stopPropagation(); playPrev(); };
            document.getElementById('miniNextBtn').onclick = (e) => { e.stopPropagation(); playNext(); };
            document.getElementById('expandedPlayPauseBtn').onclick = togglePlayPause;
            document.getElementById('expandedPrevBtn').onclick = playPrev;
            document.getElementById('expandedNextBtn').onclick = playNext;
            document.getElementById('expandedLikeBtn').onclick = toggleLike;
            document.getElementById('expandedPlaylistBtn').onclick = addCurrentToPlaylist;
            document.getElementById('expandedProgressBar').onclick = seek;
            document.getElementById('miniPlayer').onclick = expandPlayer;
            document.getElementById('closeExpandedBtn').onclick = collapsePlayer;
            document.getElementById('closeExpandedBtn2').onclick = collapsePlayer;
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const q = e.target.value.trim();
                if (q.length >= 2) searchTimeout = setTimeout(() => searchTracks(q), 500);
            });
            
            // ========== ЗАПУСК ==========
            initProfile();
            switchTab('search');
        })();
    </script>
</body>
</html>
